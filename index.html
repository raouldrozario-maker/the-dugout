*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--t1);font-family:var(--fb);min-height:100vh;-webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}input,select,button,textarea{font-family:var(--fb)}

@keyframes glow{0%,100%{box-shadow:0 0 20px #F59E0B22}50%{box-shadow:0 0 40px #F59E0B44}}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;padding:10px 24px;border-radius:12px;color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 32px #00000088;transition:transform .3s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
header{background:linear-gradient(180deg,#0B1426,var(--bg));border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.hi{max-width:900px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-n{font-family:var(--ff);font-size:24px;font-weight:700;letter-spacing:4px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-t{font-size:9px;letter-spacing:3px;color:var(--t3);font-weight:700}
.upill{display:flex;align-items:center;gap:8px;background:var(--inp);border:1px solid var(--bdr);border-radius:24px;padding:4px 14px 4px 4px}
.udot{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:12px}
nav{display:flex;justify-content:center;gap:2px;padding:0 12px 8px;max-width:900px;margin:0 auto;overflow-x:auto}
.nb{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:0;border:0;color:var(--t3);cursor:pointer;padding:8px 4px;border-radius:8px;font-size:18px;transition:.2s;white-space:nowrap}
.nb.on{color:var(--acc);background:#F59E0B12}
.nb span:last-child{font-size:11px;font-weight:700;letter-spacing:.5px}
main{padding:20px 0 80px}.ctr{max-width:900px;margin:0 auto;padding:0 16px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:24px;margin-bottom:20px;animation:fadeUp .4s}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.ct{font-family:var(--ff);font-size:18px;font-weight:700;color:var(--acc);letter-spacing:1px}
.hero{position:relative;background:linear-gradient(135deg,#0B1426,#162040);border:1px solid #F59E0B22;border-radius:20px;padding:28px 20px;margin-bottom:20px;text-align:center;overflow:hidden;animation:glow 3s infinite}
.bdg-c{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--ff);letter-spacing:1px;margin:0 auto;color:#fff}
.bdg-n{margin-top:6px;font-size:11px;color:var(--t2);font-weight:600;text-align:center}
.cg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{display:flex;align-items:center;gap:10px;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:8px 14px;cursor:pointer;transition:.2s;color:#CBD5E1}
.chip:hover{border-color:var(--bdr2)}.chip.on{border-color:var(--acc);background:#F59E0B10}
.ca{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:14px;flex-shrink:0}
.ar{display:flex;gap:8px}
.inp{flex:1;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:12px 16px;color:var(--t1);font-size:15px;outline:0}
.inp:focus{border-color:var(--bdr2)}
.bp{background:var(--grad);border:0;border-radius:12px;padding:12px 22px;color:#000;font-weight:800;cursor:pointer;font-size:15px;white-space:nowrap}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.rc{background:var(--inp);border-radius:12px;padding:14px;border:1px solid var(--bdr)}
.rc-t{font-size:13px;font-weight:800;color:var(--acc);margin-bottom:4px}.rc-d{font-size:12px;color:var(--t4);line-height:1.4}
.sr{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1E293B10}
.bb{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:16px 20px;margin-bottom:18px}
.bb-d{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:18px}
.bb-a{font-size:24px;font-weight:900;font-family:var(--ff)}
.fr{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.fb{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bdr);background:0;color:var(--t4);font-weight:700;font-size:14px;cursor:pointer;transition:.2s;min-width:60px}
.fb.on{background:#F59E0B15;border-color:#F59E0B44;color:var(--acc)}
.mc{background:var(--card);border:1px solid var(--bdr);border-left:4px solid var(--acc);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeUp .3s}
.mc.lk{border-left-color:var(--t3)}.mc.dn{border-left-color:var(--grn)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.mm{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mn{font-weight:800;font-size:13px;color:var(--acc);font-family:var(--ff)}
.md{font-size:13px;color:var(--t4)}
.ms{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:800}
.mt{display:flex;align-items:center;justify-content:space-around;padding:8px 0}
.mvs{font-family:var(--ff);font-size:22px;font-weight:700;color:var(--acc)}
.mv{font-size:11px;color:var(--t3);text-align:center;max-width:130px}
.rb{margin-top:12px;padding:10px 16px;background:#10B98115;border:1px solid #10B98130;border-radius:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:14px;color:var(--grn)}
.mb{margin-top:12px;padding:10px 16px;background:#F59E0B10;border:1px solid #F59E0B25;border-radius:12px;display:flex;flex-wrap:wrap;gap:12px;font-size:14px;color:var(--yel)}
.ob{margin-top:12px;width:100%;padding:14px;background:#F59E0B10;border:1px dashed #F59E0B44;border-radius:12px;color:var(--acc);font-weight:800;font-size:15px;cursor:pointer}
.bf{margin-top:14px;padding:18px;background:var(--inp);border:1px solid var(--bdr2);border-radius:14px;animation:fadeUp .3s}

.bf-s{margin-bottom:16px}

.bf-h{font-size:12px;color:var(--t3);margin-top:6px}

function dl(m){const[h,mn]=m.t.split(':').map(Number);const d=new Date(m.d+'T00:00:00+05:30');d.setHours(h,mn,0,0);d.setMinutes(d.getMinutes()-40);return d}
function lk(m){return new Date()>=dl(m)}
function fd(s){return new Date(s+'T00:00:00+05:30').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
function ft(s){const[h,m]=s.split(':');const hr=+h;return`${hr>12?hr-12:hr}:${m} ${hr>=12?'PM':'AM'}`}
function cd(m){const df=dl(m)-new Date();if(df<=0)return'LOCKED';const d=Math.floor(df/864e5),h=Math.floor((df%864e5)/36e5),mn=Math.floor((df%36e5)/6e4);return d>0?d+'d '+h+'h':h>0?h+'h '+mn+'m':mn+'m'}

function gm(id){const m=MM.find(x=>x.id===id);if(!m)return null;if(m.playoff&&S.po&&S.po[id]){return{...m,h:S.po[id].h,a:S.po[id].a}}return m}
function gms(){return MM.map(m=>m.playoff&&S.po&&S.po[m.id]?{...m,h:S.po[m.id].h,a:S.po[m.id].a}:m)}

// Balance: based on RESOLVED results only — pending bets don't deduct
// Floor of 2K only applies when balance is genuinely negative/zero after all resolutions
function bal(n){
  let b=ST;
  const userBets=Object.values(S.b).filter(x=>x.u===n);
  userBets.forEach(bt=>{
    const rs=S.r[bt.mid];
    if(rs){
      const w=bt.tm===rs.w,mh=bt.mom&&bt.mom.trim().toLowerCase()===(rs.mom||'').trim().toLowerCase(),od=parseFloat(bt.od)||2;
      if(w){const py=bt.am/od;b+=py;if(mh)b+=bt.am*MOMB;if(mh&&bt.mt&&bt.mt!==bt.tm)b+=py}
      else{if(!mh)b-=bt.am}
    }
    // Pending bets do NOT deduct from available balance
  });
  // Crystal Ball — excluded from balance
  // Weekly penalty
  let pen=weeklyPenalty(n);
  const waived=(S.adj||[]).filter(a=>a.type==='waive'&&a.player===n).reduce((s,a)=>s+a.amount,0);
  pen=Math.max(pen-waived,0);
  b-=pen;
  // Manual adjustments
  (S.adj||[]).filter(a=>a.player===n&&a.type!=='waive').forEach(a=>{
    if(a.type==='add')b+=a.amount;
    else if(a.type==='deduct')b-=a.amount;
  });
  if(b<MINB)b=MINB;
  return Math.round(b);
}

// Amount at risk in pending (unresolved) bets
function atRisk(n){
  return Object.values(S.b).filter(x=>x.u===n&&!S.r[x.mid]).reduce((s,x)=>s+x.am,0);
}

// Raw balance without floor — for true P&L calculation
function rawBal(n){
  let b=ST;
  const userBets=Object.values(S.b).filter(x=>x.u===n);
  userBets.forEach(bt=>{
    const rs=S.r[bt.mid];
    if(rs){
      const w=bt.tm===rs.w,mh=bt.mom&&bt.mom.trim().toLowerCase()===(rs.mom||'').trim().toLowerCase(),od=parseFloat(bt.od)||2;
      if(w){const py=bt.am/od;b+=py;if(mh)b+=bt.am*MOMB;if(mh&&bt.mt&&bt.mt!==bt.tm)b+=py}
      else{if(!mh)b-=bt.am}
    }
    // Pending bets do NOT affect P&L — only resolved results count
  });
  let pen=weeklyPenalty(n);
  const waived=(S.adj||[]).filter(a=>a.type==='waive'&&a.player===n).reduce((s,a)=>s+a.amount,0);
  pen=Math.max(pen-waived,0);
  b-=pen;
  (S.adj||[]).filter(a=>a.player===n&&a.type!=='waive').forEach(a=>{
    if(a.type==='add')b+=a.amount;else if(a.type==='deduct')b-=a.amount;
  });
  return Math.round(b);
}

// Final balance including Crystal Ball — admin eyes only
function finalBal(n){
  let b=bal(n);
  const ko=S.ko?.[n];
  if(ko&&S.koRevealed&&S.koWinner){
    if(ko.team===S.koWinner)b+=ko.amount;else b-=ko.amount;
  }
  if(b<MINB)b=MINB;
  return Math.round(b);
}

// Weekly penalty: 20% if no bet placed Wed→Tue
function weeklyPenalty(n){
  if(!S.p[n])return 0;
  const userBets=Object.values(S.b).filter(x=>x.u===n);
  const firstMatch=new Date('2026-03-28T00:00:00+05:30');
  const now=new Date();
  if(now<firstMatch)return 0;
  // No penalty if no results exist at all (tournament hasn't effectively started)
  if(Object.keys(S.r).length===0)return 0;
  let penalty=0;
  let weekStart=new Date('2026-03-26T00:00:00+05:30');
  while(weekStart<now){
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+7);
    if(weekEnd>now)break;
    const matchesThisWeek=MM.filter(m=>{const md=new Date(m.d+'T00:00:00+05:30');return md>=weekStart&&md<weekEnd});
    // Only penalize if matches happened AND at least one result was recorded that week
    const resultsThisWeek=matchesThisWeek.filter(m=>S.r[m.id]);
    if(matchesThisWeek.length>0&&resultsThisWeek.length>0){
      const betThisWeek=userBets.some(bt=>{const md=MM.find(m=>m.id===bt.mid);if(!md)return false;const d=new Date(md.d+'T00:00:00+05:30');return d>=weekStart&&d<weekEnd});
      if(!betThisWeek)penalty+=Math.round(ST*0.2);
    }
    weekStart=new Date(weekEnd);
  }
  return penalty;
}

// Detailed penalty breakdown for Stats transparency
function getPenaltyBreakdown(){
  const players=Object.keys(S.p);
  const firstMatch=new Date('2026-03-28T00:00:00+05:30');
  const now=new Date();
  const weeks=[];
  const totals={};
  if(now<firstMatch||Object.keys(S.r).length===0)return {weeks,totals};
  let weekStart=new Date('2026-03-26T00:00:00+05:30');
  let weekNum=0;
  while(weekStart<now){
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+7);
    if(weekEnd>now)break;
    const matchesThisWeek=MM.filter(m=>{const md=new Date(m.d+'T00:00:00+05:30');return md>=weekStart&&md<weekEnd});
    const resultsThisWeek=matchesThisWeek.filter(m=>S.r[m.id]);
    if(matchesThisWeek.length>0&&resultsThisWeek.length>0){
      weekNum++;
      const wsLabel=weekStart.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      const weLabel=new Date(weekEnd.getTime()-86400000).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      const defaulters=[];
      players.forEach(n=>{
        const userBets=Object.values(S.b).filter(x=>x.u===n);
        const betThisWeek=userBets.some(bt=>{const md=MM.find(m=>m.id===bt.mid);if(!md)return false;const d=new Date(md.d+'T00:00:00+05:30');return d>=weekStart&&d<weekEnd});
        if(!betThisWeek){defaulters.push(n);totals[n]=(totals[n]||0)+Math.round(ST*0.2)}
      });
      weeks.push({label:`Week ${weekNum} (${wsLabel} – ${weLabel})`,defaulters,matchCount:matchesThisWeek.length});
    }
    weekStart=new Date(weekEnd);
  }
  return {weeks,totals};
}

function sv(){localStorage.setItem('dg-s',JSON.stringify(S));if(db)db.ref('dugout').set(S);ren();uh()}

function ld(){
  // Load local state
  try{const r=JSON.parse(localStorage.getItem('dg-s'));if(r){S=r;S.p=S.p||{};S.b=S.b||{};S.r=S.r||{};S.pin=S.pin||null;S.odds=S.odds||{};S.ko=S.ko||{};S.po=S.po||{};S.adj=S.adj||[];S.announce=S.announce||null;S.squadEdits=S.squadEdits||{};S.capEdits=S.capEdits||{};if(S.customMatches)(S.customMatches).forEach(cm=>{if(!MM.find(m=>m.id===cm.id))MM.push(cm)})}}catch{}
  // Try Firebase
  const cfg=localStorage.getItem('dg-fb');
  if(cfg&&typeof firebase!=='undefined'){try{
    const c=JSON.parse(cfg);
    if(!firebase.apps.length)firebase.initializeApp(c);
    db=firebase.database();
    // SYNC FIX: Read remote first, only then listen
    db.ref('dugout').once('value').then(snap=>{
      const d=snap.val();
      if(d&&Object.keys(d.p||{}).length>0){
        // Remote has data — use it (don't overwrite with empty local)
        S.p=d.p||{};S.b=d.b||{};S.r=d.r||{};S.pin=d.pin||null;S.odds=d.odds||{};S.ko=d.ko||{};S.po=d.po||{};S.adj=d.adj||[];S.announce=d.announce||null;S.squadEdits=d.squadEdits||{};S.capEdits=d.capEdits||{};if(d.customMatches)(d.customMatches).forEach(cm=>{if(!MM.find(m=>m.id===cm.id))MM.push(cm)});
        localStorage.setItem('dg-s',JSON.stringify(S));
      }else if(Object.keys(S.p).length>0){
        // Remote empty but local has data — push local to remote
        db.ref('dugout').set(S);
      }
      // Now start real-time listener
      db.ref('dugout').on('value',sn=>{
        const d2=sn.val()||{};S.p=d2.p||{};S.b=d2.b||{};S.r=d2.r||{};S.pin=d2.pin||null;S.odds=d2.odds||{};S.ko=d2.ko||{};S.po=d2.po||{};S.adj=d2.adj||[];S.announce=d2.announce||null;S.squadEdits=d2.squadEdits||{};S.capEdits=d2.capEdits||{};if(d2.customMatches)(d2.customMatches).forEach(cm=>{if(!MM.find(m=>m.id===cm.id))MM.push(cm)});
        localStorage.setItem('dg-s',JSON.stringify(S));ren();uh();
      });
      ren();uh();
    });
    $('mtag').textContent='LIVE';$('mtag').style.background='#10B98122';$('mtag').style.color='#34D399';
  }catch(e){console.log('FB fail:',e)}}
  if(me&&!S.p[me])me=null;
  uh();nav('home');
}

        <span style="font-size:13px;font-weight:800;color:${T[popTeam[0]]?.c||'var(--acc)'}">${T[popTeam[0]]?.s||popTeam[0]} (${popTeam[1]} bets)</span>

      ${bigB?`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--inp);border-radius:10px">

// MATCHES
// ══════════════════════════════════════════════════════════════
function rM(){
  const el=$('v-matches');
  if(!me){el.innerHTML=`<div class="card" style="text-align:center;padding:48px"><div style="font-size:48px;margin-bottom:12px">👤</div><div style="font-size:18px;font-weight:700;color:var(--acc)">Pick your name first</div><div style="color:var(--t4)">Go Home → tap your name</div></div>`;return}
  const b=bal(me);
  const allM=gms().filter(m=>!m.playoff||m.h!=='TBD'); // only show playoffs with assigned teams
  let fm=mf==='upcoming'?allM.filter(m=>!S.r[m.id]&&!lk(m)):mf==='locked'?allM.filter(m=>lk(m)&&!S.r[m.id]):mf==='results'?allM.filter(m=>S.r[m.id]):mf==='mybets'?allM.filter(m=>S.b[m.id+'-'+me]):allM;
  const risk=atRisk(me);
  let h=`<div class="bb"><div style="display:flex;align-items:center;gap:10px"><div class="bb-d">${me[0].toUpperCase()}</div><div><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase">Playing as</div><div style="font-weight:800;font-size:15px">${me}</div></div></div><div style="text-align:right"><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase">Balance</div><div class="bb-a" style="color:${b>=ST?'var(--grn)':'var(--red)'}">₹${b.toLocaleString()}</div>${risk>0?`<div style="font-size:11px;color:var(--acc)">₹${risk.toLocaleString()} at risk</div>`:''}</div></div>
  <div class="fr"><button class="fb ${mf==='upcoming'?'on':''}" onclick="mf='upcoming';rM()">Open</button><button class="fb ${mf==='locked'?'on':''}" onclick="mf='locked';rM()">Locked</button><button class="fb ${mf==='results'?'on':''}" onclick="mf='results';rM()">Results</button><button class="fb ${mf==='mybets'?'on':''}" onclick="mf='mybets';rM()">My Bets</button></div>`;
  if(!fm.length)h+=`<div style="text-align:center;color:var(--t3);padding:32px">Nothing here yet.</div>`;
  fm.forEach(m=>{
    const l=lk(m),bk=m.id+'-'+me,my=S.b[bk],rs=S.r[m.id],ab=Object.values(S.b).filter(x=>x.mid===m.id),dh=MM.filter(x=>x.d===m.d).length>1,mo=S.odds[m.id];
    h+=`<div class="mc ${rs?'dn':l?'lk':''}"><div class="mh"><div class="mm"><span class="mn">${m.playoff?m.v:'#'+m.id}</span>${dh&&!m.playoff?'<span style="background:#EF444420;color:var(--hot);padding:1px 8px;border-radius:6px;font-size:9px;font-weight:800">2x</span>':''}<span class="md">${fd(m.d)} · ${ft(m.t)}</span></div><div class="ms" style="background:${rs?'#10B98120':l?'#EF444420':'#F59E0B20'};color:${rs?'var(--grn)':l?'var(--red)':'var(--yel)'}">${rs?'✅ DONE':l?'🔒 LOCKED':'⏱️ '+cd(m)}</div></div>
    <div class="mt">${bdg(m.h,44)}<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="mvs">VS</div><div class="mv">${m.playoff?m.v:m.v}</div></div>${bdg(m.a,44)}</div>`;
    // Odds display
    if(mo&&T[m.h]){h+=`<div style="display:flex;justify-content:center;gap:20px;margin-top:10px;padding:8px;background:var(--inp);border-radius:10px;font-size:13px"><span style="color:${T[m.h].c};font-weight:800">${T[m.h].s}: <span style="color:var(--yel)">1/${mo[m.h]}</span></span><span style="color:${T[m.a].c};font-weight:800">${T[m.a].s}: <span style="color:var(--yel)">1/${mo[m.a]}</span></span></div>`}
    else if(!rs&&!l&&T[m.h]){h+=`<div style="text-align:center;margin-top:10px;padding:8px;background:var(--inp);border-radius:10px;font-size:12px;color:var(--t3)">⏳ Waiting for admin to set odds</div>`}
    if(rs&&rs.voided)h+=`<div class="rb" style="background:#64748B20;border-color:#64748B44"><span>🌧️ <strong>Match Voided</strong> — No Result</span></div>`;

function placeKO(){
  const team=$('ko-team').value,pct=parseInt($('ko-pct').value);
  if(!team){toast('Pick a team!','err');return}
  if(!pct||pct<1||pct>100){toast('Enter 1-100%','err');return}
  const b=bal(me),amount=Math.round(b*pct/100);
  if(!confirm(`🔒 SECRET BET\n\n${T[team]?.n} to win IPL 2026\n₹${amount.toLocaleString()} (${pct}% of your balance)\n\nThis is permanent — you cannot change it.\nOnly you and the admin will see this until the reveal.\n\nConfirm?`))return;
  if(!S.ko)S.ko={};
  S.ko[me]={team,pct,amount,ts:new Date().toISOString()};
  sv();toast('Crystal Ball prediction locked! 🔮');rM();
}

function editBet(id){
  // Delete current bet and reopen form (balance will restore since pending bet removed)
  const bk=id+'-'+me;

  if(old)bfs[id]={tm:old.tm,oldAm:old.am,oldMom:old.mom,editing:true};

  sv();

}

function cancelEdit(id,oldBet){

function pk(id,tm){bfs[id]=bfs[id]||{};bfs[id].tm=tm;const m=gm(id);[m.h,m.a].forEach(t=>{const b=$('pk-'+id+'-'+t);if(b){if(t===tm){b.style.background=T[t]?.c||'#888';b.style.color='#fff'}else{b.style.background='transparent';b.style.color=T[t]?.c||'#888'}}});calcWin(id)}

function fmtAmt(el){const raw=el.value.replace(/[^0-9]/g,'');el.value=raw?parseInt(raw).toLocaleString():''}
function parseAmt(id){return parseInt(($('am-'+id)?.value||'').replace(/,/g,''))||0}

function calcWin(id){
  const wc=$('wc-'+id);if(!wc)return;
  const f=bfs[id]||{},mo=S.odds[id]||{},am=parseAmt(id);
  if(!f.tm||!am||am<1||!mo[f.tm]){wc.style.display='none';return}
  wc.style.display='block';
  const od=parseFloat(mo[f.tm]);
  const win=Math.round(am/od);
  const momBonus=Math.round(am*MOMB);
  $('wc-win-'+id).textContent='+₹'+win.toLocaleString();
  $('wc-lose-'+id).textContent='-₹'+am.toLocaleString();
  $('wc-momv-'+id).textContent='+₹'+win.toLocaleString()+' + ₹'+momBonus.toLocaleString()+' = +₹'+(win+momBonus).toLocaleString();
}
function sub(id){
  const m=gm(id);if(!m||lk(m)){toast('Locked!','err');return}
  if(S.r[id]){toast('Match already has a result!','err');return}
  const f=bfs[id]||{};if(!f.tm){toast('Pick a team!','err');return}
  const mo=S.odds[id];if(!mo||!mo[f.tm]){toast('Odds not set!','err');return}
  const od=parseFloat(mo[f.tm]),am=parseAmt(id);
  if(!am||am<500){toast('Min ₹500','err');return}
  const b=bal(me),ai=am===b;
  if(am>b){toast('Not enough balance! Max: ₹'+b.toLocaleString(),'err');return}
  if(!ai&&am%500!==0){toast('Multiples of ₹500','err');return}
  const momSel=$('mo-'+id);
  const mom=momSel?momSel.value.trim():'';
  if(!mom){if(!confirm('You haven\'t picked a Man of the Match.\n\nSelecting a MoM gives you a +20% bonus if correct, and saves you from a loss if your team loses.\n\nContinue without MoM?'))return}
  let mt='';
  if(mom){const mx2=gm(id);if(getSquad(mx2.h).includes(mom))mt=mx2.h;else if(getSquad(mx2.a).includes(mom))mt=mx2.a}
  const potWin=Math.round(am/od);
  const momBonus=mom?Math.round(am*MOMB):0;
  const confirmMsg=`🏏 Confirm your bet:\n\n` +
    `Match: ${T[m.h]?.s||m.h} vs ${T[m.a]?.s||m.a}\n` +
    `Team: ${T[f.tm]?.n||f.tm}\n` +
    `Amount: ₹${am.toLocaleString()} @ 1/${od}\n` +
    `Potential win: ₹${potWin.toLocaleString()}` +
    (mom?` (+₹${momBonus.toLocaleString()} MoM bonus)`:'') + `\n` +
    (mom?`MoM pick: ${mom}\n`:'No MoM selected\n') +
    (ai?`\n🔥 ALL IN!\n`:'') +
    `\nPlace this bet?`;
  if(!confirm(confirmMsg))return;
  S.b[id+'-'+me]={mid:id,u:me,tm:f.tm,am,od,mom:mom||null,mt:mt||null,ts:new Date().toISOString()};
  sv();toast('₹'+am.toLocaleString()+' on '+f.tm+'! 🔥');delete bfs[id];rM();
}

function shareWA(id){
  const m=gm(id),mo=S.odds[id]||{},dl_time=getDeadlineStr(m);
  let msg=`🏏 *THE DUGOUT — Match #${id}*\n\n`;
  msg+=`${T[m.h]?.n||m.h} vs ${T[m.a]?.n||m.a}\n`;
  msg+=`📅 ${fd(m.d)} · ${ft(m.t)} IST\n`;
  msg+=`📍 ${m.v}\n\n`;
  if(mo[m.h]&&mo[m.a])msg+=`📊 *Odds:*\n${T[m.h]?.s} → 1/${mo[m.h]}\n${T[m.a]?.s} → 1/${mo[m.a]}\n\n`;
  msg+=`🔒 Bets lock at ${dl_time}\n\n`;
  msg+=`💰 Place your bets now!\n`;
  const url=window.location.href;

    // Each player's Crystal Ball result
    const koPlayers=Object.keys(S.p).sort();
    const koBets=koPlayers.filter(n=>S.ko?.[n]);
    const koNone=koPlayers.filter(n=>!S.ko?.[n]);

    koBets.forEach(n=>{

          <div style="font-size:11px;color:var(--t4)">${won?'Won':'Lost'}</div>
        </div>
      </div>`;
    });

    if(koNone.length){
      h+=`<div style="margin-top:8px;padding:10px;background:var(--inp);border-radius:10px;font-size:12px;color:var(--t3)">Didn't participate: ${koNone.join(', ')}</div>`;
    }

    // Final Standings
    h+=`<div style="margin-top:20px;border-top:1px solid #F59E0B33;padding-top:16px">
      <div style="text-align:center;margin-bottom:16px"><div class="ct" style="font-size:18px;color:var(--acc);text-align:center">🏆 FINAL STANDINGS</div>
      <div style="font-size:12px;color:var(--t4)">Regular balance + Crystal Ball result</div></div>`;
    const finalL=Object.keys(S.p).map(n=>({n,pub:bal(n),fin:finalBal(n),ko:S.ko?.[n]||null})).sort((a,b)=>b.fin-a.fin);
    finalL.forEach((p,i)=>{
      const isMe=me===p.n;
      const diff=p.fin-p.pub;
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:6px;background:${isMe?'#F59E0B08':'var(--inp)'};border:1px solid ${isMe?'#F59E0B33':'var(--bdr)'};border-radius:12px">
        <span style="font-weight:900;font-size:16px;width:32px;text-align:center;color:${i<3?['#FBBF24','#94A3B8','#D97706'][i]:'var(--t3)'}">${i<3?['👑','🥈','🥉'][i]:'#'+(i+1)}</span>

          <div style="font-weight:700;font-size:14px;color:${isMe?'var(--acc)':'var(--t1)'}">${p.n}${isMe?' (you)':''}</div>
          <div style="font-size:11px;color:var(--t4)">Base: ₹${p.pub.toLocaleString()}${diff!==0?' · CB: <span style="color:'+(diff>0?'var(--grn)':'var(--red)')+'">'+( diff>0?'+':'')+diff.toLocaleString()+'</span>':''}</div>
        </div>
        <div style="font-size:20px;font-weight:900;color:var(--acc);font-family:var(--ff)">₹${p.fin.toLocaleString()}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  el.innerHTML=h;
}

  }

  // ─── HEAD-TO-HEAD ───
  h+=`<div class="card"><div class="ch"><span style="font-size:18px">⚔️</span><span class="ct">HEAD-TO-HEAD</span></div>`;
  const h2h={};
  resolved.forEach(bt=>{
    const rs=S.r[bt.mid],m=gm(bt.mid);if(!rs||!m)return;
    const myBet=bt,iWon=bt.tm===rs.w;

    const otherBets=Object.values(S.b).filter(x=>x.mid===bt.mid&&x.u!==n&&S.r[x.mid]);

  else{

      const clr=net>0?'var(--grn)':net<0?'var(--red)':'var(--t2)';

        </div>
      </div>`;
    });
  }
  h+=`</div>`;

  // ─── CRYSTAL BALL ───
  const ko=S.ko?.[n];
  if(ko||S.koOpen||S.koRevealed){
    h+=`<div class="card"><div class="ch"><span style="font-size:18px">🔮</span><span class="ct">CRYSTAL BALL</span></div>`;

      }else{

        <div style="font-size:14px;color:var(--t2)">Prediction locked: <strong style="color:${T[ko.team]?.c||'var(--acc)'}">${T[ko.team]?.s||ko.team}</strong></div>

        <div style="font-size:12px;color:var(--t3);margin-top:8px">🤫 Secret until the admin reveals at the end-of-season event</div></div>`;

// Admin sub-functions
// Simple hash for PIN (not cryptographic, but hides plain text from Firebase)
async function hashPin(pin){const enc=new TextEncoder().encode(pin);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function admL(){const p=$('adm-pin').value;if(!S.pin){if(p.length<4){toast('Min 4 digits','err');return}hashPin(p).then(h=>{S.pin=h;sv();adm=true;toast('Admin on! 🔑');rA()})}else{hashPin(p).then(h=>{if(h===S.pin){adm=true;toast('Welcome! 🔑');rA()}else{toast('Wrong PIN','err')}})}}

function oddsMC(){const id=parseInt($('odds-m').value),f=$('odds-f');if(!id){f.innerHTML='';return}const m=gm(id),ex=S.odds[id]||{};
f.innerHTML=`<div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap"><div style="flex:1;min-width:130px"><div class="bf-l" style="color:${T[m.h]?.c}">${T[m.h]?.s} (1/x)</div><input class="bf-i" type="number" id="od-h-${id}" value="${ex[m.h]||''}" min="1" step="0.5" placeholder="e.g. 2"></div><div style="flex:1;min-width:130px"><div class="bf-l" style="color:${T[m.a]?.c}">${T[m.a]?.s} (1/x)</div><input class="bf-i" type="number" id="od-a-${id}" value="${ex[m.a]||''}" min="1" step="0.5" placeholder="e.g. 3"></div></div><div style="display:flex;gap:8px;margin-top:12px"><button class="bp" style="flex:1" onclick="sOdds(${id})">📊 Publish</button>${ex[m.h]?`<button style="flex:0;background:#EF444420;border:1px solid var(--hot);border-radius:12px;padding:10px 20px;color:var(--red);font-size:14px;cursor:pointer;font-weight:700" onclick="clearOdds(${id})">🗑️ Clear</button>`:''}</div>${ex[m.h]?`<div style="margin-top:8px;font-size:12px;color:var(--grn)">✅ Current: ${T[m.h]?.s} 1/${ex[m.h]} · ${T[m.a]?.s} 1/${ex[m.a]}</div>`:''}`}

function sOdds(id){const m=gm(id),hv=parseFloat($('od-h-'+id).value),av=parseFloat($('od-a-'+id).value);if(!hv||!av||hv<1||av<1){toast('Set odds for both','err');return}
  const existingBets=Object.values(S.b).filter(x=>x.mid===id);
  if(existingBets.length>0&&S.odds[id]){if(!confirm(`⚠️ ${existingBets.length} bet(s) already placed on this match! Changing odds will affect existing bets. Existing bets keep their OLD odds. Continue?`))return}
  S.odds[id]={};S.odds[id][m.h]=hv;S.odds[id][m.a]=av;sv();toast('Odds published! 📊');oddsMC()}
function clearOdds(id){const bets=Object.values(S.b).filter(x=>x.mid===id);if(bets.length){toast('Can\'t clear — '+bets.length+' bet(s) already placed on this match','err');return}if(!confirm('Clear odds for this match?'))return;delete S.odds[id];sv();toast('Odds cleared');oddsMC();rA()}

function voidMatch(id){
  const m=gm(id);
  const bets=Object.values(S.b).filter(x=>x.mid===id);
  const msg=`🌧️ VOID MATCH — ${T[m.h]?.s||m.h} vs ${T[m.a]?.s||m.a}\n\n` +
    `This will:\n` +
    `• Delete all ${bets.length} bet(s) on this match\n` +
    `• Refund all players (bets removed = money back)\n` +
    `• Mark the match as "No Result"\n\n` +
    `This cannot be undone. Continue?`;
  if(!confirm(msg))return;
  // Delete all bets for this match
  Object.keys(S.b).forEach(k=>{if(S.b[k].mid===id)delete S.b[k]});
  // Record as voided (so it doesn't show as pending)
  S.r[id]={w:'VOID',mom:null,voided:true,ts:new Date().toISOString()};
  sv();toast('Match voided — all bets refunded 🌧️');rA();
}

function sqAdd(k){
  const name=$('sq-new').value.trim();
  if(!name){toast('Enter player name','err');return}
  const sq=[...getSquad(k)];
  if(sq.includes(name)){toast(name+' already in squad','err');return}
  sq.push(name);
  if(!S.squadEdits)S.squadEdits={};
  S.squadEdits[k]=sq;
  sv();toast(name+' added to '+T[k].s+' ✅');sqTeamChange();
}
function sqRemove(k,name){
  if(!confirm('Remove '+name+' from '+T[k].s+'?'))return;
  const sq=getSquad(k).filter(p=>p!==name);
  if(!S.squadEdits)S.squadEdits={};
  S.squadEdits[k]=sq;
  // If removed player was captain, clear captain
  if(getCap(k)===name){if(!S.capEdits)S.capEdits={};S.capEdits[k]='';}
  sv();toast(name+' removed from '+T[k].s);sqTeamChange();
}

function adminPlaceBet(mid){
  const player=$('ab-player').value;
  if(!player){toast('Select a player','err');return}
  if(!abTeam){toast('Pick a team','err');return}
  const am=parseInt($('ab-amt').value);
  if(!am||am<500){toast('Min ₹500','err');return}
  const b=bal(player);
  if(am>b){toast(player+' only has ₹'+b.toLocaleString(),'err');return}
  const mo=S.odds[mid];
  const od=parseFloat(mo[abTeam]);
  const momSel=$('ab-mom');
  const mom=momSel?momSel.value.trim():'';
  let mt='';
  if(mom){const mx=gm(mid);if(getSquad(mx.h).includes(mom))mt=mx.h;else if(getSquad(mx.a).includes(mom))mt=mx.a}
  const reason=$('ab-reason').value.trim();
  const m=gm(mid);
  if(!confirm(`🔓 ADMIN BET OVERRIDE\n\nPlayer: ${player}\nMatch: ${T[m.h]?.s} vs ${T[m.a]?.s}\nTeam: ${T[abTeam]?.n}\nAmount: ₹${am.toLocaleString()} @ 1/${od}\nMoM: ${mom||'None'}\nReason: ${reason||'No reason'}\n\nThis bypasses the lock timer.\nConfirm?`))return;
  S.b[mid+'-'+player]={mid,u:player,tm:abTeam,am,od,mom:mom||null,mt:mt||null,ts:new Date().toISOString(),adminBet:true,reason:reason||null};
  sv();toast('Bet placed for '+player+' ✅');abTeam='';rA();
}

function editKO(name){
  const k=S.ko[name];if(!k)return;
  const newTeam=prompt('Current team: '+( T[k.team]?.n||k.team)+'\n\nEnter new team code (e.g. RCB, MI, CSK) or leave blank to keep:');
  const teamCode=newTeam?newTeam.trim().toUpperCase():'';
  if(teamCode&&!T[teamCode]){toast('Invalid team code: '+teamCode,'err');return}
  const newAmt=prompt('Current amount: ₹'+k.amount.toLocaleString()+' ('+k.pct+'%)\n\nEnter new amount or leave blank to keep:');
  const amt=newAmt?parseInt(newAmt.replace(/,/g,'')):0;
  if(newAmt&&(!amt||amt<1)){toast('Invalid amount','err');return}
  const updatedTeam=teamCode||k.team;
  const updatedAmt=amt||k.amount;
  const updatedPct=amt?Math.round(amt/bal(name)*100):k.pct;
  if(!confirm(`Update ${name}'s Crystal Ball:\n\nTeam: ${T[updatedTeam]?.n||updatedTeam}\nAmount: ₹${updatedAmt.toLocaleString()}\n\nConfirm?`))return;
  S.ko[name]={team:updatedTeam,pct:updatedPct,amount:updatedAmt,ts:k.ts,editedByAdmin:true};
  sv();toast(name+'\'s Crystal Ball updated ✏️');rA();
}

function addMatch(){
  const id=parseInt($('nm-id').value)||MM.length+1;

  if(!day||day<1||day>31){toast('Enter a valid day (1-31)','err');return}

  const time=$('nm-time').value;
  const home=$('nm-home').value;
  const away=$('nm-away').value;
  const venue=$('nm-venue').value.trim();
  if(!home||!away){toast('Pick both teams','err');return}
  if(home===away){toast('Teams must be different','err');return}

  if(MM.find(m=>m.id===id)){toast('Match #'+id+' already exists','err');return}

  if(!S.customMatches)S.customMatches=[];
  S.customMatches.push({id,d:date,t:time,h:home,a:away,v:venue});
  sv();
  toast('Match #'+id+' added! ✅');
  rA();
}

let pendingLogin='';
function promptLogin(n){
  if(me===n)return;
  pendingLogin=n;
  const pdata=S.p[n];
  // If player has no PIN (migrated from old data), let them set one
  if(!pdata.pin){
    const pin=prompt(n+' — no PIN set yet. Create a 4-digit PIN now:');

    hashPin(pin).then(h=>{S.p[n].pin=h;sv();toast('PIN set! Now login with it.');showLoginPrompt(n)});

function timeAgo(ts){
  const s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  if(s<604800)return Math.floor(s/86400)+'d ago';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function editName(old){
  const nw=prompt('Edit name for "'+old+'":\n\nEnter new name:',old);
  if(!nw||!nw.trim())return;
  const newName=nw.trim();
  if(newName===old)return;
  if(S.p[newName]){toast('Name "'+newName+'" already taken!','err');return}
  // Copy player data to new name
  S.p[newName]=S.p[old];delete S.p[old];
  // Update all bets — both values AND keys
  Object.keys(S.b).forEach(k=>{
    if(S.b[k].u===old){
      S.b[k].u=newName;
      // Fix key: old key is matchId-oldName, new key is matchId-newName
      const newKey=S.b[k].mid+'-'+newName;
      if(newKey!==k){S.b[newKey]=S.b[k];delete S.b[k]}
    }
  });
  // Update Crystal Ball bet
  if(S.ko&&S.ko[old]){S.ko[newName]=S.ko[old];delete S.ko[old]}
  // Update adjustments
  if(S.adj)(S.adj).forEach(a=>{if(a.player===old)a.player=newName});
  // Update current login if it was this player
  if(me===old){me=newName;localStorage.setItem('dg-me',newName)}
  sv();toast(old+' → '+newName+' ✅');rA();
}

function remP(n){if(!confirm('Remove '+n+' and all their bets?'))return;delete S.p[n];Object.keys(S.b).forEach(k=>{if(S.b[k].u===n)delete S.b[k]});if(S.ko&&S.ko[n])delete S.ko[n];if(S.adj)S.adj=S.adj.filter(a=>a.player!==n);if(me===n){me=null;localStorage.removeItem('dg-me')}sv();rA()}
function rstAll(){if(!confirm('⚠️ DELETE EVERYTHING?\n\nThis will wipe ALL players, bets, results, odds, Crystal Ball, adjustments, squads, and admin PIN.\n\nYou will need to set up everything from scratch.\n\nAre you absolutely sure?'))return;const pin=prompt('Enter Admin PIN to confirm:');if(!pin)return;hashPin(pin).then(h=>{if(h!==S.pin){toast('Wrong PIN — reset cancelled','err');return}S={p:{},b:{},r:{},pin:null,odds:{},ko:{},po:{},adj:[],announce:null,customMatches:[],koOpen:false,koRevealed:false,koWinner:null,koPublished:false,squadEdits:{},capEdits:{},trash:[]};adm=false;me=null;localStorage.removeItem('dg-me');sv();toast('Everything reset! 💀');nav('home')})}

function cFB(){const raw=$('fb-cfg').value.trim(),err=$('fb-err');err.textContent='';
if(typeof firebase==='undefined'){err.textContent='Firebase SDK not loaded. Deploy to Netlify first, or check your internet connection.';return}
try{const c=JSON.parse(raw);if(!c.databaseURL){err.textContent='Missing databaseURL';return}localStorage.setItem('dg-fb',raw);if(!firebase.apps.length)firebase.initializeApp(c);db=firebase.database();
// Push local then listen
db.ref('dugout').once('value').then(snap=>{
  const d=snap.val();
  if(!d||Object.keys(d.p||{}).length===0){db.ref('dugout').set(S)}
  else{S.p=d.p||{};S.b=d.b||{};S.r=d.r||{};S.pin=d.pin||null;S.odds=d.odds||{};S.ko=d.ko||{};S.po=d.po||{};S.adj=d.adj||[];S.announce=d.announce||null;S.squadEdits=d.squadEdits||{};S.capEdits=d.capEdits||{};if(d.customMatches)(d.customMatches).forEach(cm=>{if(!MM.find(m=>m.id===cm.id))MM.push(cm)})}
  db.ref('dugout').on('value',sn=>{const d2=sn.val()||{};S.p=d2.p||{};S.b=d2.b||{};S.r=d2.r||{};S.pin=d2.pin||null;S.odds=d2.odds||{};S.ko=d2.ko||{};S.po=d2.po||{};S.adj=d2.adj||[];S.announce=d2.announce||null;S.squadEdits=d2.squadEdits||{};S.capEdits=d2.capEdits||{};if(d2.customMatches)(d2.customMatches).forEach(cm=>{if(!MM.find(m=>m.id===cm.id))MM.push(cm)});localStorage.setItem('dg-s',JSON.stringify(S));ren();uh()});
  ren();uh();
});
$('mtag').textContent='LIVE';$('mtag').style.background='#10B98122';$('mtag').style.color='#34D399';toast('Firebase connected! 🔗');
}catch(e){err.textContent='Invalid JSON'}}
