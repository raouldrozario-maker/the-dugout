<!-- DUGOUT v3.2 - Native Select - No Custom Dropdown -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Dugout — IPL 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#05070D;--card:#0E1628;--inp:#121D30;--bdr:rgba(255,255,255,0.05);--bdr2:rgba(255,255,255,0.08);--t1:#E8ECF2;--t2:#7C879A;--t3:#4A5568;--t4:#6B7A90;--acc:#D4A24E;--hot:#C4453A;--grad:linear-gradient(135deg,#D4A24E,#C49032);--grn:#3FB08C;--red:#D45B5B;--yel:#D4A24E;--ff:'Oswald',sans-serif;--fb:'Source Sans 3',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);background-image:radial-gradient(ellipse 60% 40% at 0% 0%,rgba(212,162,78,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 100% 0%,rgba(196,69,58,0.05) 0%,transparent 60%),radial-gradient(ellipse 80% 60% at 50% 100%,rgba(212,162,78,0.04) 0%,transparent 70%);background-attachment:fixed;color:var(--t1);font-family:var(--fb);min-height:100vh;-webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}input,select,button,textarea{font-family:var(--fb)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #D4A24E18}50%{box-shadow:0 0 40px #D4A24E30}}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;padding:10px 24px;border-radius:12px;color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 32px #00000088;transition:transform .3s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
header{background:radial-gradient(ellipse 50% 100% at 0% 50%,rgba(212,162,78,0.07),transparent 50%),radial-gradient(ellipse 50% 100% at 100% 50%,rgba(196,69,58,0.05),transparent 50%),radial-gradient(circle at 20% 0%,rgba(212,162,78,0.06),transparent 40%),linear-gradient(180deg,#0B1220,#0E1628);border-bottom:1px solid #D4A24E18;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px #00000055}
.hi{max-width:1000px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-n{font-family:var(--ff);font-size:24px;font-weight:700;letter-spacing:4px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-t{font-size:9px;letter-spacing:3px;color:var(--t3);font-weight:700}
.upill{display:flex;align-items:center;gap:8px;background:var(--inp);border:1px solid var(--bdr);border-radius:24px;padding:4px 14px 4px 4px}
.udot{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:12px}
nav{display:flex;justify-content:center;gap:1px;padding:2px 10px 10px;max-width:1000px;margin:0 auto;overflow-x:auto;position:relative}
.nb{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:0;border:1px solid transparent;color:#8896AB;cursor:pointer;padding:8px 4px;border-radius:10px;font-size:18px;transition:all .2s ease;white-space:nowrap;position:relative}
.nb:hover{color:#CBD5E1;transform:translateY(-2px)}
.nb:active{transform:scale(.95)}
.nb.on{color:var(--acc);background:rgba(212,162,78,0.06);border:1px solid rgba(212,162,78,0.2);box-shadow:none}
.nb.on::after{display:none}
.nb svg{opacity:.55;transition:all .2s ease;width:20px;height:20px}
.nb:hover svg{opacity:.85}
.nb.on svg{opacity:1;stroke:var(--acc);filter:none}
.nb span:last-child{font-size:10px;font-weight:600;letter-spacing:.3px;transition:all .2s ease}
.nb.on span:last-child{font-weight:800;color:var(--acc)}
main{padding:20px 0 80px}.ctr{max-width:1000px;margin:0 auto;padding:0 16px}
body::before,body::after{content:'';position:fixed;top:0;bottom:0;width:calc((100vw - 1000px)/2 - 1px);pointer-events:none;z-index:0}
body::before{left:0;background:linear-gradient(to right,rgba(212,162,78,0.03) 0%,transparent 100%);border-right:1px solid rgba(212,162,78,0.07)}
body::after{right:0;background:linear-gradient(to left,rgba(196,69,58,0.025) 0%,transparent 100%);border-left:1px solid rgba(212,162,78,0.07)}
@media(max-width:1032px){body::before,body::after{display:none}}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:28px;margin-bottom:24px}
.tc:hover{transform:translateY(-2px)}.tc{transition:all .25s ease}
.sq-wrap{overflow:hidden;transition:max-height .2s ease,opacity .2s ease;max-height:0;opacity:0}.sq-wrap.open{max-height:2000px;opacity:1}
.sq-btn{background:0;border:0;color:var(--t3);font-size:12px;cursor:pointer;font-weight:700;padding:10px 0 0;display:flex;align-items:center;gap:6px;transition:color .2s}.sq-btn:hover{color:var(--t1)}
.sq-chev{display:inline-block;transition:transform .2s ease;font-size:10px}.sq-chev.open{transform:rotate(90deg)}

.ch{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ct{font-family:var(--ff);font-size:18px;font-weight:700;color:var(--t1);letter-spacing:1px}
.hero{position:relative;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px 20px;margin-bottom:20px;text-align:center;overflow:hidden}
.bdg-c{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--ff);letter-spacing:1px;margin:0 auto;color:#fff}
.bdg-n{margin-top:6px;font-size:11px;color:var(--t2);font-weight:600;text-align:center}
.cg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{display:flex;align-items:center;gap:10px;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:8px 14px;cursor:pointer;transition:.2s;color:#CBD5E1}
.chip:hover{border-color:var(--bdr2)}.chip.on{border-color:var(--acc);background:#D4A24E0C}
.ca{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:14px;flex-shrink:0}
.ar{display:flex;gap:8px}
.inp{flex:1;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:12px 16px;color:var(--t1);font-size:15px;outline:0}
.inp:focus{border-color:var(--bdr2)}
.bp{background:var(--grad);border:0;border-radius:10px;padding:12px 22px;color:#0C1220;font-weight:800;cursor:pointer;font-size:15px;white-space:nowrap;transition:all .2s;box-shadow:0 4px 12px rgba(212,162,78,0.2)}
.bp:hover{box-shadow:0 6px 16px rgba(212,162,78,0.3);transform:translateY(-1px)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.rc{background:var(--inp);border-radius:12px;padding:14px;border:1px solid var(--bdr)}
.rc-t{font-size:13px;font-weight:800;color:var(--acc);margin-bottom:4px}.rc-d{font-size:12px;color:var(--t4);line-height:1.4}
.sr{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1E293B10}
.bb{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:16px 20px;margin-bottom:18px}
.bb-d{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:18px}
.bb-a{font-size:24px;font-weight:900;font-family:var(--ff)}
.fr{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.fb{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bdr);background:0;color:var(--t4);font-weight:700;font-size:14px;cursor:pointer;transition:.2s;min-width:60px}
.fb.on{background:#D4A24E12;border-color:#D4A24E30;color:var(--acc)}
.mc{background:var(--card);border:1px solid var(--bdr);border-left:4px solid var(--acc);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeUp .3s}
.mc.lk{border-left-color:var(--t3);filter:grayscale(0.2);cursor:not-allowed}.mc.lk .bf-tb,.mc.lk .ob{opacity:0.5;pointer-events:none}.mc.dn{border-left-color:var(--grn)}
.mc.urgent-mid{border-left-color:var(--acc);box-shadow:0 0 25px rgba(212,162,78,0.12)}
.mc.urgent-high{border-left-color:var(--red);animation:pulse-red 1.2s infinite;transform:translateY(-1px);will-change:transform,box-shadow;backface-visibility:hidden}
.mc.urgent-high .mn{color:var(--red);font-weight:900}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.mm{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mn{font-weight:800;font-size:13px;color:var(--acc);font-family:var(--ff)}
.md{font-size:13px;color:var(--t4)}
.ms{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:800}
.mt{display:flex;align-items:center;justify-content:space-around;padding:8px 0}
.mvs{font-family:var(--ff);font-size:22px;font-weight:700;color:var(--acc)}
.mv{font-size:11px;color:var(--t3);text-align:center;max-width:130px}
.rb{margin-top:12px;padding:10px 16px;background:#3FB08C10;border:1px solid #3FB08C1A;border-radius:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:14px;color:var(--grn)}
.mb{margin-top:12px;padding:10px 16px;background:#D4A24E0C;border:1px solid #D4A24E1A;border-radius:12px;display:flex;flex-wrap:wrap;gap:12px;font-size:14px;color:var(--yel)}
.ob{margin-top:12px;width:100%;padding:14px;background:#D4A24E0C;border:1px dashed #D4A24E30;border-radius:12px;color:var(--acc);font-weight:800;font-size:15px;cursor:pointer}
.bf{margin-top:14px;padding:18px;background:var(--inp);border:1px solid var(--bdr2);border-radius:14px;animation:fadeUp .3s}
.bf-t{font-family:var(--ff);font-size:16px;font-weight:700;color:var(--acc);letter-spacing:1px;margin-bottom:16px}
.bf-s{margin-bottom:12px}
.bf-l{font-size:13px;color:var(--t4);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.bf-tr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bf-tb{padding:14px 16px;border-radius:12px;border:2px solid;font-weight:800;font-size:15px;cursor:pointer;transition:.15s;font-family:var(--ff);background:0;display:flex;align-items:center;justify-content:center;width:100%}
.bf-i{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;color:var(--t1);font-size:15px;outline:0}
.bf-i:focus{border-color:var(--bdr2)}
.bf-h{font-size:12px;color:var(--t3);margin-top:6px}
.bf-q{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.bf-qb{padding:6px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--t2);font-size:13px;cursor:pointer;font-weight:700}
.bf-qb.ai{background:var(--acc)14;color:var(--acc);border-color:var(--acc)}
.bf-a{display:flex;gap:8px;margin-top:14px}
.bf-cn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:0;color:var(--t4);font-weight:700;cursor:pointer;font-size:14px}
.bf-cf{flex:2;padding:12px;border-radius:10px;border:0;background:var(--grad);color:#0C1220;font-weight:800;cursor:pointer;font-size:15px;transition:all .2s;box-shadow:0 4px 12px rgba(212,162,78,0.2)}
.tb{background:0;border:0;color:var(--t3);font-size:13px;cursor:pointer;font-weight:700;padding:4px 0;margin-top:10px}
.bi{display:flex;gap:10px;align-items:center;font-size:13px;padding:8px 12px;background:var(--inp);border-radius:10px;margin-bottom:6px;flex-wrap:wrap}
.bi-u{font-weight:800;color:var(--t2);min-width:70px}
.lb-r{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;margin-bottom:8px}
.lb-a{font-size:20px;font-weight:900;font-family:var(--ff)}
.mbc{background:var(--inp);border:1px solid var(--bdr);border-left:4px solid var(--acc);border-radius:10px;padding:14px;margin-bottom:10px}
.mtag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:800;letter-spacing:1px;margin-left:8px}
.stat-card{background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-family:var(--ff);font-size:28px;font-weight:700;color:var(--acc)}
.stat-lbl{font-size:11px;color:var(--t4);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
select.bf-i{-webkit-appearance:menulist;appearance:auto;cursor:pointer;min-height:44px}
.sd-wrap{position:relative}
.sd-input{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 36px 10px 14px;color:var(--t1);font-size:15px;outline:0;font-family:var(--fb);cursor:text}
.sd-input:focus{border-color:var(--bdr2)}
.sd-input::placeholder{color:var(--t4)}
.sd-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--t4);font-size:11px}
.sd-dd{display:none;position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--card);border:1px solid var(--bdr2);border-radius:12px;max-height:280px;overflow-y:auto;z-index:200;box-shadow:0 8px 30px #00000066;-webkit-overflow-scrolling:touch}
.sd-dd.open{display:block}
.sd-grp{padding:6px 14px 4px;font-size:11px;color:var(--t4);font-weight:800;letter-spacing:1px;text-transform:uppercase;position:sticky;top:0;background:var(--card);z-index:1}
.sd-opt{padding:11px 14px;font-size:15px;color:var(--t1);cursor:pointer;border-bottom:1px solid var(--bdr)}

.sd-opt:last-child{border-bottom:0}
.sd-opt:active,.sd-opt.hi{background:var(--inp)}
.sd-opt .sd-tm{font-size:11px;color:var(--t3);margin-left:6px}
.sd-empty{padding:14px;font-size:13px;color:var(--t4);text-align:center}
.sd-clear{position:absolute;right:30px;top:50%;transform:translateY(-50%);background:0;border:0;color:var(--t4);font-size:16px;cursor:pointer;padding:4px;display:none}
.sd-wrap.has-val .sd-clear{display:block}
#ru-nav div::-webkit-scrollbar{display:none}
@media(max-width:768px){.card{padding:22px}.nb span:last-child{font-size:9px}}@media(max-width:480px){.rg{grid-template-columns:repeat(2,1fr)}.bb-a{font-size:20px}.stat-val{font-size:22px}.card{padding:16px}.lb-r{padding:12px 10px}.mc{padding:18px}.bf{padding:14px}.nb{padding:6px 2px}.nb span:first-child{font-size:16px}}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pulse-red{0%,100%{opacity:1;box-shadow:0 0 4px #C4453A}50%{opacity:.6;box-shadow:0 0 8px #C4453A}}
@keyframes allin-pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes wc-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.allin-pop{animation:allin-pop .35s ease}
.wc-show{animation:wc-in .3s ease}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10B981;position:absolute;top:6px;right:calc(50% - 16px);animation:pulse-live 1.5s ease-in-out infinite;display:none}
.nb.has-live .live-dot{display:block}
@keyframes confetti-fall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;z-index:999;animation:confetti-fall 2.5s ease-out forwards;pointer-events:none}
.mention{color:var(--acc);font-weight:700;background:#D4A24E12;padding:0 4px;border-radius:4px}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
<header><div class="hi"><div class="brand" onclick="nav('home')"><span style="font-size:26px">🏏</span><div><div class="brand-n">THE DUGOUT</div><div class="brand-t">IPL 2026 <span id="mtag" class="mtag" style="background:#D4A24E18;color:var(--acc)">OFFLINE</span></div></div></div><div class="upill" id="hu" style="display:none"><div class="udot" id="ha"></div><span id="hn" style="font-weight:700;font-size:13px;color:#CBD5E1"></span><span id="hb" style="font-weight:800;font-size:13px"></span></div></div>
<nav>
<button class="nb on" data-v="home" onclick="nav('home')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></button>
<button class="nb" data-v="matches" onclick="nav('matches')"><span class="live-dot"></span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Matches</span></button>
<button class="nb" data-v="board" onclick="nav('board')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/><path d="M4 22h16"/><path d="M10 22V10"/><path d="M14 22V10"/><path d="M8 6h8l1 3H7z"/></svg><span>Board</span></button>
<button class="nb" data-v="rules" onclick="nav('rules')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Rules</span></button>
<button class="nb" data-v="teams" onclick="nav('teams')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Teams</span></button>

function momNorm(s){if(!s)return'';return s.trim().toLowerCase().replace(/\./g,'').replace(/\s+/g,' ')}
function momMatch(pick,official){if(!pick||!official)return false;const a=momNorm(pick),b=momNorm(official);if(a===b)return true;const ap=a.split(' '),bp=b.split(' ');if(ap.length>=2&&bp.length>=2&&ap[ap.length-1]===bp[bp.length-1]){if(ap[0]===bp[0])return true;if((ap[0].length<=2||bp[0].length<=2)&&ap[0][0]===bp[0][0]&&ap[ap.length-1]===bp[bp.length-1])return true}return false}

// Core balance computation — single source of truth
function _coreBal(n){
  let b=ST;
  const userBets=Object.values(S.b).filter(x=>x.u===n);
  userBets.forEach(bt=>{
    const rs=S.r[bt.mid];
    if(rs&&!rs.voided){
      const w=bt.tm===rs.w,mh=momMatch(bt.mom,rs.mom),od=safeOd(bt);
      const py=Math.round(bt.am*(od-1));
      if(w){b+=py;if(mh)b+=Math.round(bt.am*MOM_BONUS);if(isJackpot(bt,mh))b+=py}
      else{if(!mh)b-=bt.am}
    }
  });
  let pen=weeklyPenalty(n);
  const waived=(S.adj||[]).filter(a=>a.type==='waive'&&a.player===n).reduce((s,a)=>s+a.amount,0);
  pen=Math.max(pen-waived,0);
  b-=pen;
  (S.adj||[]).filter(a=>a.player===n&&a.type!=='waive').forEach(a=>{
    if(a.type==='add')b+=a.amount;else if(a.type==='deduct')b-=a.amount;
  });
  return Math.round(b);
}

// Player-facing balance (floored at MINB safety net)
function bal(n){return Math.max(_coreBal(n),MINB)}

// Bettable balance (no floor — prevents infinite money exploit at ₹2K)
function betBal(n){return Math.max(_coreBal(n),0)}

// Amount at risk in pending (unresolved) bets
function atRisk(n){
  return Object.values(S.b).filter(x=>x.u===n&&!S.r[x.mid]).reduce((s,x)=>s+x.am,0);
}

// Raw balance without floor — for true P&L calculation
function rawBal(n){return _coreBal(n)}

// Final balance including Crystal Ball — admin eyes only
function finalBal(n){
  let b=bal(n);
  const ko=S.ko?.[n];
  if(ko&&S.koRevealed&&S.koWinner){
    if(ko.team===S.koWinner)b+=ko.amount;else b-=ko.amount;
  }
  if(b<MINB)b=MINB;
  return Math.round(b);
}

// Weekly penalty: 20% if no bet placed Wed→Tue
function weeklyPenalty(n){
  if(!S.p[n])return 0;
  const userBets=Object.values(S.b).filter(x=>x.u===n);
  const firstMatch=new Date('2026-03-28T00:00:00+05:30');
  const now=new Date();
  if(now<firstMatch)return 0;
  // No penalty if no results exist at all (tournament hasn't effectively started)
  if(Object.keys(S.r).length===0)return 0;
  let penalty=0;
  let weekStart=new Date('2026-03-26T00:00:00+05:30');
  while(weekStart<now){
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+7);
    if(weekEnd>now)break;
    const matchesThisWeek=MM.filter(m=>{const md=new Date(m.d+'T00:00:00+05:30');return md>=weekStart&&md<weekEnd});
    // Only penalize if matches happened AND at least one non-voided result was recorded that week
    const resultsThisWeek=matchesThisWeek.filter(m=>S.r[m.id]&&!S.r[m.id].voided);
    if(resultsThisWeek.length>=2){
      const betThisWeek=userBets.some(bt=>{const md=MM.find(m=>m.id===bt.mid);if(!md)return false;if(S.r[bt.mid]?.voided)return false;const d=new Date(md.d+'T00:00:00+05:30');return d>=weekStart&&d<weekEnd});
      if(!betThisWeek)penalty+=PENALTY_AMOUNT;
    }
    weekStart=new Date(weekEnd);
  }
  return penalty;
}

// Detailed penalty breakdown for Stats transparency
function getPenaltyBreakdown(){
  const players=Object.keys(S.p);
  const firstMatch=new Date('2026-03-28T00:00:00+05:30');
  const now=new Date();
  const weeks=[];
  const totals={};
  if(now<firstMatch||Object.keys(S.r).length===0)return {weeks,totals};
  let weekStart=new Date('2026-03-26T00:00:00+05:30');
  let weekNum=0;
  while(weekStart<now){
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+7);
    if(weekEnd>now)break;
    const matchesThisWeek=MM.filter(m=>{const md=new Date(m.d+'T00:00:00+05:30');return md>=weekStart&&md<weekEnd});
    const resultsThisWeek=matchesThisWeek.filter(m=>S.r[m.id]&&!S.r[m.id].voided);
    if(resultsThisWeek.length>=2){
      weekNum++;
      const wsLabel=weekStart.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      const weLabel=new Date(weekEnd.getTime()-86400000).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      const defaulters=[];
      players.forEach(n=>{
        const userBets=Object.values(S.b).filter(x=>x.u===n);
        const betThisWeek=userBets.some(bt=>{const md=MM.find(m=>m.id===bt.mid);if(!md)return false;if(S.r[bt.mid]?.voided)return false;const d=new Date(md.d+'T00:00:00+05:30');return d>=weekStart&&d<weekEnd});
        if(!betThisWeek){defaulters.push(n);totals[n]=(totals[n]||0)+PENALTY_AMOUNT}
      });
      weeks.push({label:`Week ${weekNum} (${wsLabel} – ${weLabel})`,defaulters,matchCount:matchesThisWeek.length,start:weekStart.toISOString().slice(0,10),end:new Date(weekEnd.getTime()-86400000).toISOString().slice(0,10)});
    }
    weekStart=new Date(weekEnd);
  }
  return {weeks,totals};
}

function LB(){return Object.keys(S.p).map(n=>({n,b:bal(n)})).sort((a,b)=>b.b-a.b)}

// Player Personality System
function getPersonality(name){
  const ub=Object.values(S.b).filter(x=>x.u===name);
  const rb=ub.filter(x=>S.r[x.mid]&&!S.r[x.mid].voided);
  if(rb.length<2)return null;

  const wins=rb.filter(b=>b.tm===S.r[b.mid].w);
  const winPct=rb.length?wins.length/rb.length:0;

  // Favourite vs underdog ratio
  let favBets=0,dogBets=0;
  ub.forEach(bt=>{
    const mo=S.odds[bt.mid];if(!mo)return;
    const m=gm(bt.mid);if(!m)return;
    const myOd=parseFloat(mo[bt.tm])||2;
    const oppTm=bt.tm===m.h?m.a:m.h;
    const oppOd=parseFloat(mo[oppTm])||2;
    if(myOd<=oppOd)favBets++;else dogBets++;
  });
  const dogRatio=ub.length?(dogBets/ub.length):0;

  // All-in detection (bet >= 60% of player's balance — using betBal for accuracy)
  const playerBal=betBal(name);
  const bigBets=ub.filter(b=>b.am>=(playerBal>0?playerBal:ST*0.5)*ALL_IN_THRESHOLD).length;

  // Streak detection
  const sorted=[...rb].sort((a,b)=>{const ma=gm(a.mid),mb=gm(b.mid);return new Date(ma?.d||0)-new Date(mb?.d||0)});
  let curStreak=0,maxLoseStreak=0,curLose=0;
  let minBal=ST,maxDrop=0,recovered=false;
  let runBal=ST;
  sorted.forEach(bt=>{
    const w=bt.tm===S.r[bt.mid].w,od=safeOd(bt);
    const mh=momMatch(bt.mom,S.r[bt.mid].mom);
    if(w){runBal+=Math.round(bt.am*(od-1));curLose=0}
    else{if(!mh)runBal-=bt.am;curLose++}
    if(runBal<minBal)minBal=runBal;
    if(curLose>maxLoseStreak)maxLoseStreak=curLose;
  });
  const curBal=bal(name);
  const dropped=ST-minBal;
  if(dropped>=ST*0.3&&curBal>minBal+dropped*0.5)recovered=true;

  // Increasing bet after loss detection (tilting)
  let tilting=false,tiltCount=0;
  for(let i=1;i<sorted.length;i++){
    const prev=sorted[i-1],cur=sorted[i];
    if(!S.r[prev.mid])continue;const prevLost=prev.tm!==S.r[prev.mid].w;
    if(prevLost&&cur.am>prev.am*TILT_MULTIPLIER){tiltCount++}else{tiltCount=0}
    if(tiltCount>=2)tilting=true;
  }

  // Priority-based assignment
  if(bigBets>=3)return {id:'allin',emoji:'🔥',label:'All-In Merchant',desc:'Goes big or goes home. '+bigBets+' massive bets and counting.'};
  if(recovered)return {id:'comeback',emoji:'📈',label:'Comeback King',desc:'Was down ₹'+dropped.toLocaleString()+', fought back. Never count them out.'};
  if(tilting&&maxLoseStreak>=3)return {id:'tilt',emoji:'💀',label:'Tilting Machine',desc:'Loses and doubles down. '+maxLoseStreak+' losses in a row and bet sizes keep climbing.'};
  if(dogRatio>0.6)return {id:'gambler',emoji:'🎲',label:'Gambler',desc:'Picks underdogs '+Math.round(dogRatio*100)+'% of the time. High risk, high reward.'};
  if(dogRatio<0.3&&ub.length>=3)return {id:'safe',emoji:'🎯',label:'Safe Player',desc:'Plays favourites '+Math.round((1-dogRatio)*100)+'% of the time. Calculated and cautious.'};
  if(rb.length>=3&&winPct>=0.7&&ub.every(b=>b.am<=ST*0.4))return {id:'sniper',emoji:'🧠',label:'Sniper',desc:'Low stakes, high accuracy. '+Math.round(winPct*100)+'% win rate without going big.'};
  if(winPct>=0.6&&curBal>ST)return {id:'money',emoji:'💰',label:'Money Maker',desc:'Consistently profitable. Balance growing steadily at ₹'+curBal.toLocaleString()+'.'};
  if(winPct<0.4&&rb.length>=3)return {id:'unlucky',emoji:'🪦',label:'The Unlucky One',desc:'Win rate at '+Math.round(winPct*100)+'%. The odds aren\'t kind — but they keep showing up.'};
  return {id:'neutral',emoji:'⚡',label:'Dark Horse',desc:'No clear pattern yet. Unpredictable — which makes them dangerous.'};
}

function getBalBreakdown(n){
  let h=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr)"><span style="color:var(--t2)">Starting balance</span><span style="color:var(--grn)">₹${ST.toLocaleString()}</span></div>`;

    const m=gm(bt.mid);
    const won=bt.tm===rs.w;
    const momH=momMatch(bt.mom,rs.mom);
    const od=safeOd(bt);
    let change=0,detail='';
    if(won){
      const py=Math.round(bt.am*(od-1));change=py;detail=`Profit ₹${py.toLocaleString()} (₹${bt.am.toLocaleString()} × (${od} - 1))`;

  if(pendingBets.length){

    });

  const pen=weeklyPenalty(n);
  const waived=(S.adj||[]).filter(a=>a.type==='waive'&&a.player===n).reduce((s,a)=>s+a.amount,0);
  const netPen=Math.max(pen-waived,0);
  if(pen>0){h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr)"><span style="color:var(--red)">⚠️ No bets placed in ${Math.round(pen/PENALTY_AMOUNT)} week${pen>PENALTY_AMOUNT?'s':''} → penalty${waived>0?' (₹'+waived.toLocaleString()+' waived)':''}</span><span style="color:var(--red);font-weight:700">-₹${netPen.toLocaleString()}</span></div>`}
  // Manual adjustments
  (S.adj||[]).filter(a=>a.player===n&&a.type!=='waive').forEach(a=>{
    h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr)"><span style="color:${a.type==='add'?'var(--grn)':'var(--red)'}">💰 ${a.reason||'Admin adjustment'}</span><span style="color:${a.type==='add'?'var(--grn)':'var(--red)'}">₹${a.type==='add'?'+':'-'}${a.amount.toLocaleString()}</span></div>`});
  // Final
  h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;margin-top:4px;font-weight:800"><span style="color:var(--t1)">Current Balance</span><span style="color:var(--acc)">₹${bal(n).toLocaleString()}</span></div>`;
  return h;
}

function placeKO(){
  const team=$('ko-team').value,pct=parseInt($('ko-pct').value);
  if(!team){toast('Pick a team!','err');return}
  if(!pct||pct<1||pct>100){toast('Enter 1-100%','err');return}
  const b=betBal(me),amount=Math.round(b*pct/100);
  if(!confirm(`🔒 SECRET BET\n\n${T[team]?.n} to win IPL 2026\n₹${amount.toLocaleString()} (${pct}% of your balance)\n\nThis is permanent — you cannot change it.\nOnly you and the admin will see this until the reveal.\n\nConfirm?`))return;
  if(!S.ko)S.ko={};
  S.ko[me]={team,pct,amount,ts:new Date().toISOString()};
  sv(['ko']);toast('Crystal Ball prediction locked! 🔮');rM();
}

function editBet(id){
  // Delete current bet and reopen form (balance will restore since pending bet removed)
  const bk=id+'-'+me;
  const old=S.b[bk];
  // Store old values for pre-fill
  if(old)bfs[id]={tm:old.tm,oldAm:old.am,oldMom:old.mom,editing:true};
  delete S.b[bk];
  sv(["b"]);
  // Small delay to let render happen then open form
  setTimeout(()=>oBF(id,old),100);
}

      </div>`;
    });
    h+=`</div></div>`;
  }

  el.innerHTML=h;
}

    svg+=`</svg>`;

    // Legend
    let legend=series.map(s=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)"><span style="width:8px;height:8px;border-radius:50%;background:${s.color};opacity:${s.name===me?'1':'0.6'}"></span>${s.name}</span>`).join(' · ');

    h+=`<div id="st-balance" class="card" style="position:relative">
      <div class="ct" style="font-size:14px;margin-bottom:14px">📈 BALANCE OVER TIME</div>
      <div style="margin-bottom:10px;position:relative">
        ${svg}
        <div id="chart-tip" style="display:none;position:absolute;top:8px;right:8px;background:var(--card);border:1px solid var(--bdr2);border-radius:10px;padding:10px 14px;box-shadow:0 4px 20px #00000066;font-size:12px;z-index:10;pointer-events:none"></div>
      </div>
      <div style="text-align:center">${legend}</div>
    </div>`;
  }

  // ─── TEAM POPULARITY (Donut Chart) ───
  if(sortedTeams.length>=1){
    const totalTeamBets=sortedTeams.reduce((s,t)=>s+t[1],0);
    const R=70,r=45,cx=90,cy=90;
    let donutSvg=`<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="width:180px;height:180px">`;
    let angle=0;
    sortedTeams.forEach(([tm,count])=>{
      const pct=count/totalTeamBets;
      const a1=angle*Math.PI/180;
      const a2=(angle+pct*360)*Math.PI/180;
      const la=pct>0.5?1:0;
      const x1o=cx+R*Math.cos(a1),y1o=cy+R*Math.sin(a1);
      const x2o=cx+R*Math.cos(a2),y2o=cy+R*Math.sin(a2);
      const x1i=cx+r*Math.cos(a2),y1i=cy+r*Math.sin(a2);
      const x2i=cx+r*Math.cos(a1),y2i=cy+r*Math.sin(a1);
      const color=T[tm]?.c||'#6B7A90';
      donutSvg+=`<path d="M${x1o},${y1o} A${R},${R} 0 ${la} 1 ${x2o},${y2o} L${x1i},${y1i} A${r},${r} 0 ${la} 0 ${x2i},${y2i}Z" fill="${color}" opacity="0.75"/>`;
      angle+=pct*360;
    });
    donutSvg+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--t1)" font-size="16" font-weight="900" font-family="var(--ff)">${totalTeamBets}</text>`;
    donutSvg+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" fill="var(--t4)" font-size="9">bets</text>`;
    donutSvg+=`</svg>`;

    const teamLegend=sortedTeams.slice(0,6).map(([tm,count])=>{
      const pct=Math.round(count/totalTeamBets*100);
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
        <span style="width:10px;height:10px;border-radius:2px;background:${T[tm]?.c||'#6B7A90'};opacity:0.75;flex-shrink:0"></span>
        <span style="flex:1;font-size:12px;color:var(--t2)">${T[tm]?.s||tm}</span>
        <span style="font-size:12px;font-weight:700;color:var(--t1);font-family:var(--ff)">${pct}%</span>
      </div>`;
    }).join('');

    h+=`<div id="st-team" class="card">
      <div class="ct" style="font-size:14px;margin-bottom:14px">🏏 TEAM POPULARITY</div>
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <div style="flex-shrink:0">${donutSvg}</div>
        <div style="flex:1;min-width:140px">${teamLegend}</div>
      </div>
    </div>`;
  }

  // ─── PROFIT BY TEAM (Bar Chart) ───
  if(resolvedBets.length>=1){
    const teamPL={};
    resolvedBets.forEach(bt=>{
      const rs=S.r[bt.mid];if(!rs)return;
      const w=bt.tm===rs.w,od=safeOd(bt);
      const mh=momMatch(bt.mom,rs.mom);
      let change=0;
      if(w){change=Math.round(bt.am*(od-1));if(mh)change+=Math.round(bt.am*MOM_BONUS);if(isJackpot(bt,mh))change+=Math.round(bt.am*(od-1))}
      else{change=mh?0:-bt.am}
      if(!teamPL[bt.tm])teamPL[bt.tm]=0;
      teamPL[bt.tm]+=change;
    });
    const teamPLArr=Object.entries(teamPL).sort((a,b)=>b[1]-a[1]);
    if(teamPLArr.length>=2){
      const maxAbs=Math.max(...teamPLArr.map(t=>Math.abs(t[1])),1);
      let bars=teamPLArr.map(([tm,pl])=>{
        const pct=Math.round(Math.abs(pl)/maxAbs*100);
        const isPos=pl>=0;
        return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0">
          <span style="width:36px;font-size:12px;font-weight:800;color:${T[tm]?.c||'var(--t2)'};text-align:right">${T[tm]?.s||tm}</span>
          <div style="flex:1;height:20px;background:var(--inp);border-radius:4px;overflow:hidden;position:relative">
            <div style="height:100%;width:${pct}%;background:${isPos?'var(--grn)':'var(--red)'};opacity:0.5;border-radius:4px"></div>
          </div>
          <span style="width:70px;font-size:12px;font-weight:800;color:${isPos?'var(--grn)':'var(--red)'};font-family:var(--ff);text-align:right">${isPos?'+':''}₹${pl.toLocaleString()}</span>
        </div>`;
      }).join('');

      h+=`<div id="st-profit" class="card">
        <div class="ct" style="font-size:14px;margin-bottom:14px">📊 PROFIT BY TEAM</div>
        <div style="font-size:11px;color:var(--t4);margin-bottom:12px">League-wide P&L from betting on each team</div>
        ${bars}
      </div>`;
    }
  }

  // ─── FAVOURITE vs UNDERDOG (Donut) ───
  if(allBets.length>=1){
    let favAm=0,udAm=0,favCount=0,udCount=0;
    allBets.forEach(bt=>{
      const mo=S.odds[bt.mid];if(!mo)return;
      const m=gm(bt.mid);if(!m)return;
      const myOd=parseFloat(mo[bt.tm])||2;
      const oppTm=bt.tm===m.h?m.a:m.h;
      const oppOd=parseFloat(mo[oppTm])||2;
      if(myOd<=oppOd){favAm+=bt.am;favCount++}else{udAm+=bt.am;udCount++}
    });
    const total=favAm+udAm;
    if(total>0){
      const favPct=Math.round(favAm/total*100),udPct=100-favPct;
      const R=70,r=45,cx=90,cy=90;
      const favAngle=favPct/100*360;

      let dSvg=`<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="width:160px;height:160px">`;
      // Favourite slice
      const a1=(-90)*Math.PI/180;
      const a2=(-90+favAngle)*Math.PI/180;
      const la=favPct>50?1:0;
      const fx1=cx+R*Math.cos(a1),fy1=cy+R*Math.sin(a1);
      const fx2=cx+R*Math.cos(a2),fy2=cy+R*Math.sin(a2);
      const fi1=cx+r*Math.cos(a2),fi2=cy+r*Math.sin(a2);
      const fi3=cx+r*Math.cos(a1),fi4=cy+r*Math.sin(a1);
      dSvg+=`<path d="M${fx1},${fy1} A${R},${R} 0 ${la} 1 ${fx2},${fy2} L${fi1},${fi2} A${r},${r} 0 ${la} 0 ${fi3},${fi4}Z" fill="var(--acc)" opacity="0.7"/>`;
      // Underdog slice
      const ua=favPct<100?1:0;
      const la2=udPct>50?1:0;
      dSvg+=`<path d="M${fx2},${fy2} A${R},${R} 0 ${la2} 1 ${fx1},${fy1} L${fi3},${fi4} A${r},${r} 0 ${la2} 0 ${fi1},${fi2}Z" fill="#7C6AB8" opacity="0.7"/>`;
      dSvg+=`</svg>`;

      h+=`<div id="st-risk" class="card">
        <div class="ct" style="font-size:14px;margin-bottom:14px">🎲 BETTING PERSONALITY</div>
        <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
          <div style="flex-shrink:0">${dSvg}</div>
          <div style="flex:1;min-width:140px">
            <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)">
              <span style="width:10px;height:10px;border-radius:2px;background:var(--acc);opacity:0.7"></span>
              <span style="flex:1;font-size:12px;color:var(--t2)">Favourites</span>
              <span style="font-size:13px;font-weight:800;color:var(--acc);font-family:var(--ff)">${favPct}%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)">
              <span style="width:10px;height:10px;border-radius:2px;background:#7C6AB8;opacity:0.7"></span>
              <span style="flex:1;font-size:12px;color:var(--t2)">Underdogs</span>
              <span style="font-size:13px;font-weight:800;color:#7C6AB8;font-family:var(--ff)">${udPct}%</span>
            </div>
            <div style="font-size:11px;color:var(--t4);margin-top:8px">${favCount} safe · ${udCount} risky · ₹${total.toLocaleString()} total</div>
          </div>
        </div>
      </div>`;
    }
  }
  const awards=[];
  if(resolved.length>0){
  if(bigWinner&&bigWinner.b!==ST)awards.push({icon:'💰',title:'Richest Player',name:bigWinner.n,val:'₹'+bigWinner.b.toLocaleString(),clr:'var(--grn)'});
  if(bigLoser&&bigLoser.b<ST)awards.push({icon:'😅',title:'Needs a Comeback',name:bigLoser.n,val:'₹'+bigLoser.b.toLocaleString(),clr:'var(--red)'});
  if(luckiest)awards.push({icon:'🍀',title:'Luckiest',name:luckiest.n,val:luckiest.pct+'% win rate',clr:'var(--grn)'});
  if(oracle)awards.push({icon:'🔮',title:'MoM Oracle',name:oracle.n,val:oracle.correct+'/'+oracle.total+' correct',clr:'var(--yel)'});
  if(riskiest)awards.push({icon:'🎲',title:'Riskiest Bettor',name:riskiest.n,val:'avg ₹'+riskiest.avg.toLocaleString()+'/bet',clr:'var(--hot)'});
  if(bestStreak&&bestStreak.streak>=2)awards.push({icon:'🔥',title:'Best Win Streak',name:bestStreak.n,val:bestStreak.streak+' in a row',clr:'var(--acc)'});
  if(mostActive)awards.push({icon:'📱',title:'Most Active',name:mostActive[0],val:mostActive[1]+' bets',clr:'var(--t1)'});
  if(bigBet)awards.push({icon:'💎',title:'Biggest Single Bet',name:bigBet.u,val:'₹'+bigBet.am.toLocaleString(),clr:'var(--acc)'});
  if(bigUpset&&bigUpset.od>=3)awards.push({icon:'🎯',title:'Biggest Upset Win',name:bigUpset.u,val:'×'+bigUpset.od+' odds',clr:'var(--grn)'});
  } // end resolved.length guard

  if(awards.length){
    h+=`<div id="st-awards" class="ct" style="font-size:16px;margin-bottom:14px;text-align:center">🏆 AWARDS</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px">`;
    awards.forEach(a=>{
      h+=`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;text-align:center">
        <div style="font-size:28px;margin-bottom:6px">${a.icon}</div>
        <div style="font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${a.title}</div>
        <div style="font-weight:800;font-size:15px;color:${a.clr}">${a.name}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:2px">${a.val}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ─── MOST BACKED TEAMS ───
  if(sortedTeams.length){
    h+=`<div id="st-backed" class="card"><div class="ch"><span style="font-size:18px">🔥</span><span class="ct">MOST BACKED TEAMS</span></div>`;
    const maxTeamBets=sortedTeams[0]?sortedTeams[0][1]:1;
    sortedTeams.forEach(([tm,cnt])=>{
      const pct=Math.round(cnt/allBets.length*100);
      const barW=Math.round(cnt/maxTeamBets*100);
      h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:44px;text-align:center">${bdg(tm,36)}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span style="font-weight:700;color:${T[tm]?.c||'var(--t2)'}">${T[tm]?.s||tm}</span>
            <span style="color:var(--t4)">${cnt} bet${cnt!==1?'s':''} · ${pct}%</span>
          </div>
          <div style="height:8px;background:var(--inp);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${T[tm]?.c||'var(--acc)'};border-radius:4px"></div>
          </div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ─── WEEKLY PENALTY TRACKER ───
  const penaltyData=getPenaltyBreakdown();
  if(penaltyData.weeks.length>0){
    h+=`<div id="st-penalty" class="card"><div class="ch"><span style="font-size:18px">⚠️</span><span class="ct">WEEKLY PENALTY TRACKER</span></div>
    <div style="font-size:12px;color:var(--t4);margin-bottom:14px">At least 1 bet per active week (2+ completed matches) or ₹${PENALTY_AMOUNT.toLocaleString()} penalty.</div>`;
    penaltyData.weeks.forEach(wk=>{
      const has=wk.defaulters.length>0;
      h+=`<div style="background:var(--inp);border:1px solid ${has?'#C4453A25':'#3FB08C1A'};border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${has?'8px':'0'}">
        <span style="font-size:13px;font-weight:700;color:var(--t2)">${wk.label}</span>
        <span style="font-size:12px;color:${has?'var(--red)':'var(--grn)'};font-weight:700">${has?wk.defaulters.length+' penalized':'✅ All clear'}</span>
      </div>`;
      if(has){h+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;wk.defaulters.forEach(name=>{h+=`<span style="background:#C4453A18;border:1px solid #C4453A33;border-radius:8px;padding:3px 10px;font-size:12px;color:var(--red);font-weight:700">${name}</span>`});h+=`</div>`}
      h+=`</div>`;
    });
    const totalPenalties=penaltyData.totals;
    if(Object.keys(totalPenalties).length>0){
      h+=`<div style="margin-top:12px;padding:12px;background:#C4453A0C;border:1px solid #C4453A1A;border-radius:10px"><div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px">TOTAL PENALTIES</div>`;
      Object.entries(totalPenalties).sort((a,b)=>b[1]-a[1]).forEach(([name,amt])=>{h+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #C4453A10"><span style="color:var(--t2)">${name}</span><span style="color:var(--red);font-weight:800">-₹${amt.toLocaleString()}</span></div>`});
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  // ─── YOUR QUICK STATS (compact) ───
  if(me){
    const n=me,ub=allBets.filter(x=>x.u===n),rub=resolvedBets.filter(x=>x.u===n);
    const w=rub.filter(b=>b.tm===S.r[b.mid].w).length;
    const l=rub.filter(b=>b.tm!==S.r[b.mid].w).length;
    const b=bal(n),diff=rawBal(n)-ST;
    const rank=LB().findIndex(x=>x.n===n)+1;
    h+=`<div style="background:linear-gradient(135deg,#0C1220,#111B2E);border:1px solid var(--bdr2);border-radius:16px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:18px;font-family:var(--ff)">${n[0].toUpperCase()}</div>
          <div><div style="font-weight:800;font-size:16px">${n}</div><div style="font-size:11px;color:var(--t4)">Rank #${rank}</div></div>
        </div>
        <div style="text-align:right"><div style="font-size:22px;font-weight:900;color:${diff>=0?'var(--grn)':'var(--red)'};font-family:var(--ff)">₹${b.toLocaleString()}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div style="background:var(--inp);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--yel);font-family:var(--ff)">${ub.length}</div><div style="font-size:10px;color:var(--t4)">Bets</div></div>
        <div style="background:var(--inp);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:${w>=l?'var(--grn)':'var(--red)'};font-family:var(--ff)">${w}W/${l}L</div><div style="font-size:10px;color:var(--t4)">Record</div></div>
        <div style="background:var(--inp);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:${diff>=0?'var(--grn)':'var(--red)'};font-family:var(--ff)">${diff>=0?'+':''}${diff.toLocaleString()}</div><div style="font-size:10px;color:var(--t4)">P&L</div></div>
      </div>
      <div style="text-align:center;margin-top:12px"><button style="background:0;border:1px solid var(--acc);border-radius:10px;padding:8px 24px;color:var(--acc);font-size:13px;cursor:pointer;font-weight:700" onclick="nav('mygame')">View full stats in Locker Room →</button></div>
    </div>`;
  }

  el.innerHTML=h;
}

// ══════════════════════════════════════════════════════════════
// LOCKER ROOM
// ══════════════════════════════════════════════════════════════
let mgPlayer=null;
function rMG(){
  const el=$('v-mygame');
  const ns=Object.keys(S.p).sort();
  if(!me&&!adm){el.innerHTML=`<div class="card" style="text-align:center;padding:48px"><div style="font-size:48px;margin-bottom:12px">👤</div><div style="font-size:18px;font-weight:700;color:var(--acc)">Log in first</div><div style="color:var(--t4)">Go Home → tap your name</div></div>`;return}
  // Admin can view any player via dropdown
  const viewPlayer=adm&&mgPlayer?mgPlayer:(me||ns[0]);
  if(!viewPlayer||!S.p[viewPlayer]){el.innerHTML=`<div class="card" style="text-align:center;padding:48px;color:var(--t3)">No player selected.</div>`;return}
  const n=viewPlayer;
  const L=LB();
  const b=bal(n),risk=atRisk(n),diff=rawBal(n)-ST,rank=L.findIndex(x=>x.n===n)+1;
  const ub=Object.values(S.b).filter(x=>x.u===n);
  const resolved=ub.filter(x=>S.r[x.mid]&&!S.r[x.mid].voided);
  const pending=ub.filter(x=>!S.r[x.mid]);
  const wins=resolved.filter(x=>x.tm===S.r[x.mid].w);
  const losses=resolved.filter(x=>x.tm!==S.r[x.mid].w);
  const winPct=resolved.length?Math.round(wins.length/resolved.length*100):0;
  const totalWagered=ub.reduce((s,x)=>s+x.am,0);
  let totalWon=0,totalLost=0;
  resolved.forEach(bt=>{
    const rs=S.r[bt.mid],w=bt.tm===rs.w,mh=momMatch(bt.mom,rs.mom),od=safeOd(bt);
    if(w){let py=Math.round(bt.am*(od-1));if(mh)py+=Math.round(bt.am*MOM_BONUS);if(isJackpot(bt,mh))py+=Math.round(bt.am*(od-1));totalWon+=py}
    else{if(!mh)totalLost+=bt.am}
  });
  // Favourite team
  const teamCounts={};ub.forEach(bt=>{teamCounts[bt.tm]=(teamCounts[bt.tm]||0)+1});
  const favTeam=Object.entries(teamCounts).sort((a,b)=>b[1]-a[1])[0];
  // MoM stats
  const momPicks=ub.filter(x=>x.mom);
  const momHits=resolved.filter(x=>x.mom&&S.r[x.mid]&&momMatch(x.mom,S.r[x.mid].mom));
  // All-ins
  const allIns=ub.filter(x=>x.am>=ST||Object.values(S.b).some(()=>false));
  // Streak
  let streak=0,streakType='';
  const sortedResolved=[...resolved].sort((a,b)=>b.mid-a.mid);
  for(const bt of sortedResolved){
    const w=bt.tm===S.r[bt.mid].w;
    if(!streakType)streakType=w?'W':'L';
    if((w&&streakType==='W')||(!w&&streakType==='L'))streak++;else break;
  }
  // Biggest win/loss
  let bigWin=0,bigLoss=0,bigWinMatch='',bigLossMatch='';
  resolved.forEach(bt=>{
    const rs=S.r[bt.mid],w=bt.tm===rs.w,mh=momMatch(bt.mom,rs.mom),od=safeOd(bt),m=gm(bt.mid);
    if(w){let py=Math.round(bt.am*(od-1));if(mh)py+=Math.round(bt.am*MOM_BONUS);if(isJackpot(bt,mh))py+=Math.round(bt.am*(od-1));if(py>bigWin){bigWin=py;bigWinMatch=`${T[m?.h]?.s||'?'} v ${T[m?.a]?.s||'?'}`}}
    else{if(!mh&&bt.am>bigLoss){bigLoss=bt.am;bigLossMatch=`${T[m?.h]?.s||'?'} v ${T[m?.a]?.s||'?'}`}}
  });

  let h='';

  // Admin dropdown
  if(adm){
    h+=`<div style="background:var(--inp);border:1px solid #D4A24E25;border-radius:14px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:13px;color:var(--acc);font-weight:700">🔓 ADMIN VIEW:</span>
    <select class="bf-i" style="flex:1;min-width:150px" onchange="mgPlayer=this.value;rMG()">
    ${ns.map(p=>`<option value="${p}" ${p===n?'selected':''}>${p} (₹${bal(p).toLocaleString()})</option>`).join('')}
    </select></div>`;
  }

  if(pendingBets.length){
    const exposure={};
    pendingBets.forEach(bt=>{
      if(!exposure[bt.tm])exposure[bt.tm]={amount:0,bets:0};
      exposure[bt.tm].amount+=bt.am;
      exposure[bt.tm].bets++;
    });
    const totalExposure=pendingBets.reduce((s,x)=>s+x.am,0);
    const sortedExp=Object.entries(exposure).sort((a,b)=>b[1].amount-a[1].amount);

    h+=`<div id="mg-exposure" class="card"><div class="ch"><span style="font-size:20px">⚡</span><span class="ct">TEAM EXPOSURE</span></div>
    <div style="font-size:13px;color:var(--t4);margin-bottom:14px">Your open positions — <strong style="color:var(--acc)">₹${totalExposure.toLocaleString()}</strong> total at risk across ${pendingBets.length} pending bet${pendingBets.length!==1?'s':''}</div>`;

    sortedExp.forEach(([tm,ex])=>{
      const pct=Math.round(ex.amount/totalExposure*100);
      h+=`<div style="display:flex;align-items:center;gap:12px;padding:10px;margin-bottom:8px;background:var(--inp);border-left:3px solid ${T[tm]?.c||'var(--acc)'};border-radius:0 12px 12px 0">
        ${bdg(tm,32)}
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:14px;color:${T[tm]?.c||'var(--t1)'}">${T[tm]?.s||tm}</span>
            <span style="font-weight:900;font-size:16px;color:var(--acc);font-family:var(--ff)">₹${ex.amount.toLocaleString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
            <span style="font-size:11px;color:var(--t4)">${ex.bets} match${ex.bets!==1?'es':''} · ${pct}% of exposure</span>
          </div>
          <div style="margin-top:6px;height:4px;border-radius:2px;background:var(--bdr);overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${T[tm]?.c||'var(--acc)'};border-radius:2px"></div>
          </div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ─── TEAM PERFORMANCE TRACKER ───
  h+=`<div id="mg-teams" class="card"><div class="ch"><span style="font-size:20px">🏏</span><span class="ct">TEAM PERFORMANCE</span></div>`;
  const teamStats={};
  ub.forEach(bt=>{
    if(!teamStats[bt.tm])teamStats[bt.tm]={bets:0,wins:0,losses:0,saves:0,wagered:0,won:0,lost:0};
    const ts=teamStats[bt.tm];
    ts.bets++;ts.wagered+=bt.am;
    const rs=S.r[bt.mid];
    if(rs){
      const w=bt.tm===rs.w,mh=momMatch(bt.mom,rs.mom),od=safeOd(bt);
      if(w){ts.wins++;let py=Math.round(bt.am*(od-1));if(mh)py+=Math.round(bt.am*MOM_BONUS);if(isJackpot(bt,mh))py+=Math.round(bt.am*(od-1));ts.won+=py}
      else{if(mh){ts.saves++}else{ts.losses++;ts.lost+=bt.am}}
    }
  });
  const sortedTeamStats=Object.entries(teamStats).sort((a,b)=>b[1].won-b[1].lost-(a[1].won-a[1].lost));
  if(!sortedTeamStats.length){h+=`<div style="color:var(--t3);font-size:13px">No bets placed yet.</div>`}
  else{
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">`;
    sortedTeamStats.forEach(([tm,st])=>{
      const net=st.won-st.lost;
      const wr=st.wins+st.losses?Math.round(st.wins/(st.wins+st.losses)*100):0;
      h+=`<div style="background:var(--inp);border:1px solid ${T[tm]?.c||'var(--bdr)'}33;border-radius:14px;padding:16px;text-align:center">
        <div style="margin-bottom:8px">${bdg(tm,40)}</div>
        <div style="font-weight:800;font-size:14px;color:${T[tm]?.c||'var(--t1)'}">${T[tm]?.s||tm}</div>
        <div style="font-size:12px;color:var(--t4);margin-top:4px">${st.bets} bet${st.bets!==1?'s':''} · ${wr}% win</div>
        <div style="display:flex;justify-content:center;gap:8px;margin-top:8px;font-size:12px">
          <span style="color:var(--grn)">${st.wins}W</span>
          <span style="color:var(--red)">${st.losses}L</span>
          ${st.saves?`<span style="color:var(--yel)">${st.saves}🛡️</span>`:''}
        </div>
        <div style="margin-top:8px;font-size:16px;font-weight:900;color:${net>=0?'var(--grn)':'var(--red)'};font-family:var(--ff)">${net>=0?'+':''}₹${net.toLocaleString()}</div>
        <div style="font-size:10px;color:var(--t4)">Net P&L</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  // ─── UPCOMING MATCHES (not yet bet on) ───
  const upcoming=gms().filter(m=>!S.r[m.id]&&!lk(m)&&m.h!=='TBD'&&!S.b[m.id+'-'+n]);
  if(upcoming.length){
    h+=`<div class="card"><div class="ch"><span style="font-size:18px">📅</span><span class="ct">UPCOMING — NOT YET BET</span></div>`;
    upcoming.slice(0,5).forEach(m=>{
      const mo=S.odds[m.id];
      const cdStr=cd(m);
      h+=`<div style="background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:14px;color:var(--t1)">${T[m.h]?.s||m.h} vs ${T[m.a]?.s||m.a}</div>
          <div style="font-size:12px;color:var(--t4);margin-top:2px">${fd(m.d)} · ${ft(m.t)}${mo?' · <span style="color:var(--acc)">Odds set</span>':' · <span style="color:var(--t3)">Odds pending</span>'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--yel);font-weight:700">⏰ ${cdStr}</div>
          ${mo&&n===me?`<button style="background:var(--grad);border:0;border-radius:8px;padding:4px 14px;color:#000;font-size:12px;cursor:pointer;font-weight:800;margin-top:4px" onclick="nav('matches')">Bet now</button>`:''}
        </div>
      </div>`;
    });
    if(upcoming.length>5)h+=`<div style="text-align:center;font-size:12px;color:var(--t3)">+${upcoming.length-5} more</div>`;
    h+=`</div>`;
  }

  // ─── HEAD-TO-HEAD ───
  h+=`<div id="mg-h2h" class="card"><div class="ch"><span style="font-size:18px">⚔️</span><span class="ct">HEAD-TO-HEAD</span></div>`;
  const h2h={};
  resolved.forEach(bt=>{
    const rs=S.r[bt.mid],m=gm(bt.mid);if(!rs||!m)return;
    const myBet=bt,iWon=bt.tm===rs.w;
    // Find all other players who bet on the same match
    const otherBets=Object.values(S.b).filter(x=>x.mid===bt.mid&&x.u!==n&&S.r[x.mid]);
    otherBets.forEach(ob=>{
      if(!h2h[ob.u])h2h[ob.u]={wins:0,losses:0,draws:0,matches:0};
      h2h[ob.u].matches++;
      const theyWon=ob.tm===rs.w;
      if(iWon&&!theyWon)h2h[ob.u].wins++;
      else if(!iWon&&theyWon)h2h[ob.u].losses++;
      else h2h[ob.u].draws++;
    });
  });
  const h2hSorted=Object.entries(h2h).sort((a,b)=>(b[1].wins-b[1].losses)-(a[1].wins-a[1].losses));
  if(!h2hSorted.length){h+=`<div style="color:var(--t3);font-size:13px">No head-to-head data yet — need resolved matches where both you and another player bet.</div>`}
  else{
    h2hSorted.forEach(([opp,rec])=>{
      const net=rec.wins-rec.losses;
      const clr=net>0?'var(--grn)':net<0?'var(--red)':'var(--t2)';
      const emoji=net>0?'👑':net<0?'😤':'🤝';
      h+=`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--inp);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--t2);flex-shrink:0">${opp[0].toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px;color:var(--t1)">${opp}</div>
          <div style="font-size:12px;color:var(--t4)">${rec.matches} shared match${rec.matches!==1?'es':''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:800;font-size:15px;color:${clr}">${rec.wins}W ${rec.losses}L ${rec.draws}D</div>
          <div style="font-size:12px">${emoji} ${net>0?'You lead':net<0?'They lead':'Even'}</div>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;

  // ─── CRYSTAL BALL ───
  const ko=S.ko?.[n];
  if(ko||S.koOpen||S.koRevealed){
    h+=`<div class="card"><div class="ch"><span style="font-size:20px">🔮</span><span class="ct">CRYSTAL BALL</span></div>`;
    if(ko){
      if(S.koRevealed&&S.koWinner){
        const won=ko.team===S.koWinner;
        h+=`<div style="text-align:center;padding:16px"><div style="font-size:40px;margin-bottom:8px">${won?'🎉':'😞'}</div>
        <div style="font-size:16px;font-weight:800;color:${won?'var(--grn)':'var(--red)'}">${won?'PREDICTION CORRECT!':'PREDICTION WRONG'}</div>
        <div style="color:var(--t2);margin-top:8px">Picked <strong style="color:${T[ko.team]?.c||'var(--acc)'}">${T[ko.team]?.s||ko.team}</strong> · Wagered ₹${ko.amount.toLocaleString()} (${ko.pct}%)</div>
        <div style="color:var(--t4);margin-top:4px">IPL Winner: <strong style="color:${T[S.koWinner]?.c||'var(--acc)'}">${T[S.koWinner]?.s||S.koWinner}</strong></div>
        <div style="font-size:18px;font-weight:900;margin-top:10px;color:${won?'var(--grn)':'var(--red)'}">${won?'+':''}₹${ko.amount.toLocaleString()}</div></div>`;
      }else{
        h+=`<div style="text-align:center;padding:16px"><div style="font-size:40px;margin-bottom:8px">🔮</div>
        <div style="font-size:14px;color:var(--t2)">Prediction locked: <strong style="color:${T[ko.team]?.c||'var(--acc)'}">${T[ko.team]?.s||ko.team}</strong></div>
        <div style="color:var(--t4);margin-top:4px">Wagered ₹${ko.amount.toLocaleString()} (${ko.pct}% of balance at time of bet)</div>
        <div style="font-size:12px;color:var(--t3);margin-top:8px">🤫 Secret until the admin reveals at the end-of-season event</div></div>`;
      }
    }else if(S.koOpen){
      h+=`<div style="text-align:center;padding:16px;color:var(--acc);font-weight:700">Crystal Ball is OPEN! Go to Matches tab to place your secret prediction.</div>`;
    }else{
      h+=`<div style="color:var(--t3);font-size:13px">No Crystal Ball prediction placed.</div>`;
    }
    h+=`</div>`;
  }

  el.innerHTML=h;
}

  const dormant=totalPlayers-activePlayers;
  const totalWagered=Object.values(S.b).reduce((s,b)=>s+b.am,0);
  const nextOpen=allM.find(m=>!S.r[m.id]&&!lk(m)&&m.h!=='TBD');
  const nextLive=allM.find(m=>!S.r[m.id]&&lk(m)&&m.h!=='TBD');
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div><div style="font-family:var(--ff);font-size:28px;font-weight:700;color:var(--acc);letter-spacing:2px">COMMAND CENTER</div><div style="font-size:13px;color:var(--t4);margin-top:2px">League control panel · <span style="font-size:10px;color:var(--t4)" id="adm-ts"></span></div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button style="background:#F5A62315;border:1px solid #F5A62330;border-radius:10px;padding:8px 18px;color:var(--acc);font-size:13px;cursor:pointer;font-weight:700" onclick="openExportModal()">📤 Export</button>

    </div>
  </div>`;

  // ─── SYSTEM STATUS (top strip) ───
  h+=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:100px;background:${db?'#3FB08C10':'#C4453A10'};border:1px solid ${db?'#3FB08C25':'#C4453A25'};border-radius:12px;padding:10px 14px;text-align:center;display:flex;align-items:center;justify-content:center">
      <div style="font-size:13px;font-weight:800;color:${db?'var(--grn)':'var(--red)'}">${db?'🟢 LIVE':'🔴 OFFLINE'}</div>
    </div>
    <div style="flex:2;min-width:180px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px">
      ${nextLive?`<div style="font-size:12px;color:var(--t4)">Awaiting result</div><div style="font-size:13px;font-weight:700;color:var(--acc)">${T[nextLive.h]?.s} vs ${T[nextLive.a]?.s} · ${fd(nextLive.d)}</div>`
       :nextOpen?`<div style="font-size:12px;color:var(--t4)">Betting open</div><div style="font-size:13px;font-weight:700;color:var(--grn)">${T[nextOpen.h]?.s} vs ${T[nextOpen.a]?.s} · ${S.odds[nextOpen.id]?'Odds set ✅':'⚠️ Needs odds'}</div>`
       :`<div style="font-size:13px;color:var(--t3)">No active match</div>`}
    </div>
    <div style="flex:1;min-width:100px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;text-align:center">
      <div style="font-size:16px;font-weight:900;color:var(--acc);font-family:var(--ff)">${totalPlayers}</div>
      <div style="font-size:10px;color:var(--t4)">Players</div>
    </div>
    <div style="flex:1;min-width:100px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;text-align:center">
      <div style="font-size:16px;font-weight:900;color:var(--grn);font-family:var(--ff)">₹${totalWagered.toLocaleString()}</div>
      <div style="font-size:10px;color:var(--t4)">In Play</div>
    </div>
  </div>`;
  // State dashboard counters
  var _rp=allM.filter(m=>m.h!=='TBD'&&S.odds[m.id]&&lk(m)&&!S.r[m.id]).length;
  var _op=allM.filter(m=>m.h!=='TBD'&&S.odds[m.id]&&!lk(m)&&!S.r[m.id]).length;
  var _no=allM.filter(m=>m.h!=='TBD'&&!S.odds[m.id]&&!S.r[m.id]).length;
  var _dn=Object.keys(S.r).length;
  if(_rp||_op||_no)h+=`<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;font-size:12px;font-weight:700">
    ${_rp?'<span style="color:var(--red)">🔴 Result Pending ('+_rp+')</span>':''}
    ${_op?'<span style="color:var(--grn)">🟢 Open ('+_op+')</span>':''}
    ${_no?'<span style="color:var(--acc)">⚪ Needs Odds ('+_no+')</span>':''}
    <span style="color:var(--t3)">✅ Done ('+_dn+')</span>
  </div>`;
  // ─── LAST RESULT (quick undo) ───
  var lastResId=Object.keys(S.r).filter(function(k){return !S.r[k].voided}).sort(function(a,b){return (S.r[b].ts||'').localeCompare(S.r[a].ts||'')})[0];
  if(lastResId){
    var lr=S.r[lastResId],lm=gm(parseInt(lastResId));
    var lrHome=lm?(T[lm.h]?T[lm.h].s:lm.h):'?',lrAway=lm?(T[lm.a]?T[lm.a].s:lm.a):'?';
    h+=`<div style="background:#3FB08C0C;border:1px solid #3FB08C1A;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1px">Last Result</div>
      <div style="font-size:13px;color:var(--t1);margin-top:2px"><strong>${lrHome} vs ${lrAway}</strong> → <span style="color:var(--grn)">${T[lr.w]?T[lr.w].s:lr.w} won</span>${lr.mom?' · MoM: '+lr.mom:''}</div>
      ${lr.ts?`<div style="font-size:10px;color:var(--t4);margin-top:2px">${new Date(lr.ts).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`:''}</div>
      <button style="background:#C4453A18;border:1px solid var(--hot);border-radius:10px;padding:8px 14px;color:var(--red);font-size:12px;cursor:pointer;font-weight:700;white-space:nowrap" onclick="if(confirm('Undo result for ${lrHome} vs ${lrAway}?\\nBalances will recalculate.')){adminLog('result_undo','M#'+${lastResId});delete S.r[${lastResId}];sv(['r','logs']);toast('Result undone ↩️');rA()}">↩️ Undo</button>
    </div>`;
  }

  // ─── MATCH CONTROL BOARD (compact, state-first) ───
  function mcbState(m){
    var hasOdds=S.odds[m.id]&&S.odds[m.id][m.h]&&S.odds[m.id][m.a];
    if(S.r[m.id]&&S.r[m.id].voided)return{s:'VOIDED',pri:5,badge:'🌧️ Voided',color:'var(--t3)'};
    if(S.r[m.id])return{s:'COMPLETED',pri:4,badge:'✅ Done',color:'var(--grn)'};
    if(hasOdds&&lk(m))return{s:'RESULT_PENDING',pri:0,badge:'🔴 Needs result',color:'var(--red)'};
    if(hasOdds)return{s:'OPEN',pri:2,badge:'🟢 Open',color:'var(--grn)'};
    return{s:'NO_ODDS',pri:1,badge:'⚪ Setup',color:'var(--acc)'};
  }
  var mcbAll=allM.filter(m=>m.h!=='TBD').map(function(m){
    var st=mcbState(m);
    var bets=Object.values(S.b).filter(function(b){return b.mid===m.id});
    var exposure=bets.reduce(function(s,b){return s+b.am},0);
    return{m:m,st:st,bets:bets.length,exposure:exposure};
  });
  // Only show: RESULT_PENDING (all), OPEN (all), NO_ODDS (next 3)
  var mcbUrgent=mcbAll.filter(function(x){return x.st.s==='RESULT_PENDING'});
  var mcbOpen=mcbAll.filter(function(x){return x.st.s==='OPEN'});
  var mcbSetupAll=mcbAll.filter(function(x){return x.st.s==='NO_ODDS'});
  var mcbSetup=mcbSetupAll.slice(0,5);

// Admin sub-functions
// Simple hash for PIN (not cryptographic, but hides plain text from Firebase)
async function hashPin(pin){const enc=new TextEncoder().encode(pin);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function admL(){const p=$('adm-pin').value;if(!S.pin){if(p.length<4){toast('Min 4 digits','err');return}hashPin(p).then(h=>{S.pin=h;sv();adm=true;localStorage.setItem('dg-adm-vis','1');adminLog('admin_setup','PIN created');toast('Admin on! 🔑');rA()})}else{hashPin(p).then(h=>{if(h===S.pin){adm=true;localStorage.setItem('dg-adm-vis','1');adminLog('admin_login','Login');toast('Welcome! 🔑');rA()}else{toast('Wrong PIN','err')}})}}

function admDDToggle(ddId){
  var dd=$(ddId);if(!dd)return;
  // If portal is showing THIS dropdown, close it
  if(portal&&portal.style.display!=='none'&&portal.dataset.src===ddId){
    portal.style.display='none';portal.innerHTML='';portal.dataset.src='';_uiDDCount=Math.max(0,_uiDDCount-1);return;
  }
  // Close any open portal
  if(portal){portal.style.display='none';portal.innerHTML='';portal.dataset.src='';}
  // Find trigger to position below it
  var trigger=dd.previousElementSibling&&dd.previousElementSibling.previousElementSibling;
  if(!trigger)trigger=dd.parentElement;

    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('st-profit');$('st-sheet').style.display='none'">📊 Profit by Team</button>

    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('st-awards');$('st-sheet').style.display='none'">🏆 Awards</button>

<div id="bet-confirm-modal" style="display:none;position:fixed;inset:0;z-index:99999;background:#000a;backdrop-filter:blur(6px);align-items:center;justify-content:center"><div style="background:var(--bg);border:1px solid var(--bdr2);border-radius:20px;padding:24px;max-width:400px;width:90%;box-shadow:0 16px 64px #000c"><div id="bet-confirm-body"></div><div id="bet-confirm-btns" style="display:flex;gap:10px;margin-top:16px"><button id="bet-confirm-no" style="flex:1;padding:14px;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;color:var(--t1);font-weight:700;font-size:14px;cursor:pointer">Cancel</button><button id="bet-confirm-yes" style="flex:2;padding:14px;background:var(--grad);border:0;border-radius:12px;color:#000;font-weight:900;font-size:14px;cursor:pointer">Confirm Bet</button></div></div></div>
<div id="exp-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:#000a;backdrop-filter:blur(6px);align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--bg);border:1px solid var(--bdr2);border-radius:20px;padding:24px;max-width:440px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 64px #000c">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:900;color:var(--t1)">📤 Export Report</div>
      <button style="background:0;border:0;color:var(--t3);font-size:20px;cursor:pointer" onclick="$('exp-modal').style.display='none'">✕</button>
    </div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px">Pick sections for the tabbed HTML report. Date filtering is available inside the exported report.</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:18px">
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_overview" checked> 📊 Overview & Stats</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_board" checked> 🏆 Leaderboard</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_matches" checked> 🏏 Match Results</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_odds" checked> 📈 Odds History</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_players" checked> 👤 Player History (with Balance After)</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_teams" checked> 🏟️ Team Analytics</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_awards" checked> 🏅 Records & Hall of Fame</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_penalties" checked> ⚠️ Penalty Report</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_weekly" checked> 📅 Weekly Engagement</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_crystal" checked> 🔮 Crystal Ball</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_adjustments" checked> 🔧 Admin Adjustments</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_audittrail" checked> 📋 Audit Trail</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_narratives" checked> 📝 Key Narratives</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t1);cursor:pointer;padding:6px 0"><input type="checkbox" id="s_ledger" checked> 📋 Match Ledger (dispute proof)</label>
    </div>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:8px;background:var(--inp);border:1px solid var(--bdr);border-radius:10px;color:var(--t2);font-size:12px;cursor:pointer;font-weight:600" onclick="document.querySelectorAll('#exp-modal input[type=checkbox]').forEach(c=>c.checked=true)">Select All</button>
      <button style="flex:1;padding:8px;background:var(--inp);border:1px solid var(--bdr);border-radius:10px;color:var(--t2);font-size:12px;cursor:pointer;font-weight:600" onclick="document.querySelectorAll('#exp-modal input[type=checkbox]').forEach(c=>c.checked=false)">Clear All</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px"><button style="flex:1;padding:14px;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;color:var(--t1);font-weight:700;font-size:14px;cursor:pointer" onclick="$('exp-modal').style.display='none'">← Back</button><button style="flex:2;padding:14px;background:var(--grad);border:0;border-radius:12px;color:#000;font-weight:900;font-size:14px;cursor:pointer" onclick="runExport()">Generate Report</button></div>
  </div>
</div>

    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('mg-achieve');$('mg-sheet').style.display='none'">🏅 Achievements</button>
    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('mg-exposure');$('mg-sheet').style.display='none'">⚡ Team Exposure</button>
    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('mg-teams');$('mg-sheet').style.display='none'">🏏 Team Performance</button>
    <button style="text-align:left;background:0;border:0;padding:8px 10px;color:var(--t1);font-size:13px;cursor:pointer;border-radius:8px;font-weight:600" onclick="ruJump('mg-h2h');$('mg-sheet').style.display='none'">⚔️ Head-to-Head</button>
  </div>
</div>
